<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha de Personagem — D&D Bankai</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
/* ---- extras específicos da ficha ---- */

/* Canvas de partículas fixo atrás de tudo */
#cosmos {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* Portal de loading */
#portal-screen {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#portal-screen.fade-out { opacity: 0; visibility: hidden; }

.portal-ring { position: relative; width: 110px; height: 110px; }
.portal-ring svg { width: 100%; height: 100%; animation: portalSpin 3s linear infinite; }
@keyframes portalSpin { to { transform: rotate(360deg); } }
.portal-inner {
  position: absolute;
  inset: 18px;
  border-radius: 50%;
  background: radial-gradient(circle, #ea80ff 0%, #b388ff 40%, transparent 70%);
  opacity: 0.55;
  animation: portalPulse 1.5s ease-in-out infinite;
}
@keyframes portalPulse { 0%,100%{transform:scale(0.8);opacity:0.35} 50%{transform:scale(1.1);opacity:0.75} }
.portal-text {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: .42em;
  text-transform: uppercase;
  color: var(--ink-dim);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

/* Char art ring override para ficha */
.char-art { width: 88px; height: 88px; }
</style>
</head>
<body>

<!-- Portal loading -->
<div id="portal-screen">
  <div class="portal-ring">
    <svg viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="55" cy="55" r="50" stroke="url(#pl1)" stroke-width="1.5" stroke-dasharray="8 4"/>
      <circle cx="55" cy="55" r="38" stroke="url(#pl2)" stroke-width="1" stroke-dasharray="3 8"/>
      <defs>
        <linearGradient id="pl1" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#b388ff"/><stop offset="50%" stop-color="#ea80ff"/><stop offset="100%" stop-color="#40c4ff"/>
        </linearGradient>
        <linearGradient id="pl2" x1="110" y1="0" x2="0" y2="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ea80ff"/><stop offset="100%" stop-color="#40c4ff"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="portal-inner"></div>
  </div>
  <div class="portal-text">⧖ Convocando o Pergaminho ⧖</div>
</div>

<!-- Canvas de partículas -->
<canvas id="cosmos"></canvas>

<!-- Botão tema -->
<button id="theme-btn" title="Alternar tema" aria-label="Alternar entre modo claro e escuro">☽</button>

<div class="page" id="page">
  <div class="loading">⧖ Convocando o pergaminho…</div>
</div>

<button id="save-btn" style="display:none">SALVAR</button>
<div id="sync-status"></div>

<script>
// ---- Partículas arcanas ----
(function() {
  const canvas = document.getElementById('cosmos');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize();
  window.addEventListener('resize', resize);

  function colors() {
    return document.documentElement.getAttribute('data-theme') === 'light'
      ? ['rgba(106,27,154,','rgba(171,71,188,','rgba(2,119,189,']
      : ['rgba(179,136,255,','rgba(234,128,255,','rgba(64,196,255,'];
  }

  for (let i = 0; i < 50; i++) {
    particles.push({
      x: Math.random() * 1600, y: Math.random() * 900,
      r: Math.random() * 1.6 + 0.3,
      vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25,
      alpha: Math.random() * 0.45 + 0.12,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: Math.random() * 0.018 + 0.006,
      ci: Math.floor(Math.random() * 3)
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const c = colors();
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.pulse += p.pulseSpeed;
      if (p.x < -5) p.x = W+5; if (p.x > W+5) p.x = -5;
      if (p.y < -5) p.y = H+5; if (p.y > H+5) p.y = -5;
      const a = p.alpha * (0.55 + 0.45 * Math.sin(p.pulse));
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = c[p.ci] + a + ')'; ctx.fill();
    });
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x, dy = particles[i].y - particles[j].y;
        const d = Math.sqrt(dx*dx + dy*dy);
        if (d < 85) {
          ctx.beginPath(); ctx.moveTo(particles[i].x, particles[i].y); ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = c[0] + (0.06 * (1 - d/85)) + ')'; ctx.lineWidth = 0.4; ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ---- Theme toggle — roda antes do ficha.js ----
(function() {
  const btn  = document.getElementById('theme-btn');
  const html = document.documentElement;
  const saved = localStorage.getItem('dnd-theme') || 'dark';
  html.setAttribute('data-theme', saved);
  btn.textContent = saved === 'dark' ? '☀' : '☽';
  btn.addEventListener('click', function() {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀' : '☽';
    localStorage.setItem('dnd-theme', next);
  });
})();

// ---- Portal fade + page reveal ----
document.addEventListener('DOMContentLoaded', function() {
  // O ficha.js vai popular o #page, depois disso removemos o portal
  const observer = new MutationObserver(function(mutations) {
    const page = document.getElementById('page');
    if (page && page.children.length && !page.querySelector('.loading')) {
      setTimeout(() => {
        const portal = document.getElementById('portal-screen');
        if (portal) portal.classList.add('fade-out');
        page.style.animation = 'fadeIn 0.6s ease both';
      }, 600);
      observer.disconnect();
    }
  });
  const page = document.getElementById('page');
  if (page) observer.observe(page, { childList: true, subtree: true });

  // Fallback: remove portal após 3s
  setTimeout(() => {
    const portal = document.getElementById('portal-screen');
    if (portal && !portal.classList.contains('fade-out')) portal.classList.add('fade-out');
  }, 3000);
});
</script>

<script src="assets/ficha.js"></script>
</body>
</html>
