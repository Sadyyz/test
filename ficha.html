<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ficha — D&D Bankai</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
#cosmos { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

#portal-screen {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
  transition: opacity .9s ease, visibility .9s ease;
}
#portal-screen.fade-out { opacity: 0; visibility: hidden; }

.p-ring { position: relative; width: 110px; height: 110px; }
.p-outer { position: absolute; inset: 0; animation: spinCW 8s linear infinite; }
.p-inner { position: absolute; inset: 16px; animation: spinCCW 5s linear infinite; }
@keyframes spinCW  { to { transform: rotate(360deg); } }
@keyframes spinCCW { to { transform: rotate(-360deg); } }
.p-core {
  position: absolute; inset: 34px; border-radius: 50%;
  background: radial-gradient(circle, var(--gold-hot) 0%, var(--gold) 40%, transparent 75%);
  animation: breathe 2s ease-in-out infinite;
}
@keyframes breathe { 0%,100%{transform:scale(.85);opacity:.5} 50%{transform:scale(1.1);opacity:1} }
.p-text {
  font-family: 'Cinzel', serif; font-size: .65rem; letter-spacing: .5em;
  text-transform: uppercase; color: var(--ink-dim);
  animation: blink 1.8s ease-in-out infinite;
}

.back-btn {
  position: fixed; top: 20px; left: 20px; z-index: 200;
  background: var(--surface); border: 1px solid var(--border); color: var(--gold);
  padding: 9px 16px; font-family: 'Cinzel', serif; font-size: .56rem;
  letter-spacing: .22em; text-transform: uppercase; cursor: pointer;
  text-decoration: none; display: flex; align-items: center; gap: 7px;
  transition: all .3s; box-shadow: 0 0 12px var(--glow-g), var(--card-s);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.back-btn:hover { border-color: var(--gold); color: var(--gold-hot); transform: translateX(-3px); }

.rpg-mode-btn {
  position: fixed; top: 20px; right: 72px; z-index: 200;
  background: var(--surface); border: 1px solid var(--crimson-lt); color: var(--crimson-lt);
  padding: 9px 16px; font-family: 'Cinzel', serif; font-size: .56rem;
  letter-spacing: .22em; text-transform: uppercase; cursor: pointer;
  text-decoration: none; display: none; align-items: center; gap: 7px;
  transition: all .3s; box-shadow: 0 0 12px rgba(122,24,40,.25), var(--card-s);
  clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 8px 100%, 0 calc(100% - 8px));
}
.rpg-mode-btn.show { display: flex; }
.rpg-mode-btn:hover { border-color: var(--crimson); color: var(--crimson); transform: translateX(3px); box-shadow: 0 0 20px rgba(122,24,40,.4), var(--card-s); }
@media (max-width: 560px) {
  .rpg-mode-btn { top: auto; bottom: 70px; right: 16px; left: 16px; justify-content: center; }
}
</style>
</head>
<body>

<div id="portal-screen">
  <div class="p-ring">
    <svg class="p-outer" viewBox="0 0 110 110" fill="none">
      <polygon points="55,3 107,29 107,81 55,107 3,81 3,29"
        stroke="url(#pg1)" stroke-width="1" fill="none" stroke-dasharray="5 4"/>
      <defs>
        <linearGradient id="pg1" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#c8922a"/>
          <stop offset="50%" stop-color="#f2d078"/>
          <stop offset="100%" stop-color="#c8922a"/>
        </linearGradient>
      </defs>
    </svg>
    <svg class="p-inner" viewBox="0 0 78 78" fill="none" style="position:absolute;inset:16px;width:78px;height:78px;">
      <polygon points="39,3 75,21 75,57 39,75 3,57 3,21"
        stroke="url(#pg2)" stroke-width=".8" fill="none"/>
      <defs>
        <linearGradient id="pg2" x1="0" y1="0" x2="78" y2="78" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f2d078"/>
          <stop offset="100%" stop-color="#5a3e10"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="p-core"></div>
  </div>
  <div class="p-text">⧖ Convocando o Pergaminho ⧖</div>
</div>

<canvas id="cosmos"></canvas>
<a class="back-btn" href="index.html">← Grimório</a>
<a class="rpg-mode-btn" id="rpg-mode-btn" target="_blank" rel="noopener">⚔ Modo RPG</a>
<button id="theme-btn" title="Alternar tema">☽</button>

<div class="page" id="page">
  <div class="loading">⧖ Convocando o pergaminho…</div>
</div>

<button id="save-btn" style="display:none">SALVAR</button>
<div id="sync-status"></div>

<script>
// Particles
(function() {
  const c = document.getElementById('cosmos'), ctx = c.getContext('2d');
  let W, H, ps = [];
  function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  function cols() {
    return document.documentElement.getAttribute('data-theme') === 'light'
      ? ['rgba(138,90,16,','rgba(168,120,48,','rgba(100,70,20,']
      : ['rgba(200,146,42,','rgba(242,208,120,','rgba(90,62,16,'];
  }
  for (let i = 0; i < 44; i++) ps.push({
    x: Math.random()*1400, y: Math.random()*900,
    r: Math.random()*1.4+.3, vx: (Math.random()-.5)*.2, vy: (Math.random()-.5)*.2,
    a: Math.random()*.35+.08, p: Math.random()*Math.PI*2,
    ps: Math.random()*.015+.005, ci: Math.floor(Math.random()*3)
  });
  function draw() {
    ctx.clearRect(0,0,W,H);
    const cl = cols();
    ps.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.p+=p.ps;
      if(p.x<-5)p.x=W+5; if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5; if(p.y>H+5)p.y=-5;
      const a=p.a*(0.55+0.45*Math.sin(p.p));
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=cl[p.ci]+a+')'; ctx.fill();
    });
    for(let i=0;i<ps.length;i++) for(let j=i+1;j<ps.length;j++){
      const dx=ps[i].x-ps[j].x, dy=ps[i].y-ps[j].y, d=Math.sqrt(dx*dx+dy*dy);
      if(d<78){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);
      ctx.strokeStyle=cl[0]+(0.05*(1-d/78))+')';ctx.lineWidth=.4;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// Theme
(function(){
  const btn=document.getElementById('theme-btn'), html=document.documentElement;
  const saved=localStorage.getItem('dnd-theme')||'dark';
  html.setAttribute('data-theme',saved); btn.textContent=saved==='dark'?'☀':'☽';
  btn.addEventListener('click',()=>{
    const n=html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',n); btn.textContent=n==='dark'?'☀':'☽';
    localStorage.setItem('dnd-theme',n);
  });
})();

// Portal
document.addEventListener('DOMContentLoaded',()=>{
  const obs=new MutationObserver(()=>{
    const pg=document.getElementById('page');
    if(pg&&pg.children.length&&!pg.querySelector('.loading')){
      setTimeout(()=>{const p=document.getElementById('portal-screen');if(p)p.classList.add('fade-out');},700);
      obs.disconnect();
    }
  });
  const pg=document.getElementById('page');
  if(pg)obs.observe(pg,{childList:true,subtree:true});
  setTimeout(()=>{const p=document.getElementById('portal-screen');if(p&&!p.classList.contains('fade-out'))p.classList.add('fade-out');},3200);
});
</script>
<!-- ══ MODAL DE HABILIDADES ══ -->
<div id="skill-modal" class="modal-overlay hidden">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="modal-title">Habilidade</div>
      <button class="modal-close" id="modal-close-btn" title="Fechar">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-foot" id="modal-foot"></div>
  </div>
</div>

<script>
// Fechar modal ao clicar fora ou no X
document.getElementById('modal-close-btn').addEventListener('click', () => {
  document.getElementById('skill-modal').classList.add('hidden');
});
document.getElementById('skill-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('skill-modal')) {
    document.getElementById('skill-modal').classList.add('hidden');
  }
});
// ESC fecha o modal
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('skill-modal').classList.add('hidden');
});
</script>

<script src="assets/ficha.js"></script>
</body>
</html>
