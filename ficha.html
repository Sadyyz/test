<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasos — Ficha do Escritor</title>
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>

  <button id="theme-btn" title="Alternar tema" onclick="toggleTheme()">☽</button>

  <a href="index.html" class="back-btn">⟵ Escritores</a>
  <a href="mestre.html" class="back-btn" style="left:auto;right:70px;top:20px;">🔮 Jardim do Mestre</a>

  <div class="page" id="page">
    <div class="loading">Carregando o manuscrito…</div>
  </div>

  <button id="save-btn" style="display:none">SALVAR</button>
  <div id="sync-status"></div>

  <!-- MODAL -->
  <div class="modal-overlay hidden" id="skill-modal">
    <div class="modal-box">
      <div class="modal-head">
        <span class="modal-title" id="modal-title">—</span>
        <button class="modal-close" id="modal-close-btn">✕</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-foot" id="modal-foot"></div>
    </div>
  </div>

  <script src="assets/ficha.js"></script>
  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☽' : '☀';
      localStorage.setItem('phantasos-theme', next);
    }
    const savedTheme = localStorage.getItem('phantasos-theme');
    if (savedTheme) {
      document.documentElement.dataset.theme = savedTheme;
      document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☽' : '☀';
    }
  </script>
</body>
</html>
