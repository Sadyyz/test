<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Bankai — Grimório</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0a0809;--bg2:#100d12;--surface:#161219;--surface2:#1e1825;
  --border:#2c2238;--ink:#ede0c8;--ink-2:#b8a890;--ink-dim:#6a5a48;
  --gold:#c8922a;--gold-lt:#e8be68;--gold-hot:#f2d078;--gold-dim:#5a3e10;
  --crimson:#7a1828;--crimson-lt:#b83040;
  --glow-g:rgba(200,146,42,.2);--card-s:0 2px 20px rgba(0,0,0,.75);
  --rune-op:.018;
}
[data-theme="light"]{
  --bg:#f4ede0;--bg2:#ece4d4;--surface:#fdf8f0;--surface2:#f5eddc;
  --border:#c8a870;--ink:#18100a;--ink-2:#5a4030;--ink-dim:#8a6a50;
  --gold:#8a5a10;--gold-lt:#aa7830;--gold-hot:#7a4808;--gold-dim:#e8d4b0;
  --crimson:#6a0f1e;--crimson-lt:#9a1830;
  --glow-g:rgba(138,90,16,.1);--card-s:0 2px 20px rgba(60,30,0,.08);
  --rune-op:.035;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--ink);font-family:'IM Fell English',Georgia,serif;min-height:100vh;overflow-x:hidden;transition:background .5s,color .5s}
body::before{
  content:"ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ";
  position:fixed;inset:0;font-size:1.4rem;letter-spacing:.6em;line-height:4em;
  color:var(--gold);opacity:var(--rune-op);word-break:break-all;pointer-events:none;z-index:0;padding:32px;
  animation:runeShift 70s linear infinite;
}
@keyframes runeShift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4%)}}
#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Portal */
#portal{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity 1s ease,visibility 1s ease;
}
#portal.out{opacity:0;visibility:hidden}
.p-ring{position:relative;width:120px;height:120px}
.p-out{position:absolute;inset:0;animation:spinCW 8s linear infinite}
.p-in{position:absolute;inset:16px;animation:spinCCW 5s linear infinite}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
.p-core{position:absolute;inset:32px;border-radius:50%;background:radial-gradient(circle,var(--gold-hot) 0%,var(--gold) 40%,transparent 75%);animation:breath 2s ease-in-out infinite}
@keyframes breath{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.p-title{font-family:'Cinzel Decorative',serif;font-size:1.4rem;font-weight:900;
  background:linear-gradient(135deg,var(--gold-lt),var(--gold-hot));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px rgba(200,146,42,.5));animation:fadeIn .8s ease .3s both}
.p-sub{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.5em;text-transform:uppercase;color:var(--ink-dim);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Theme btn */
.theme-btn{
  position:fixed;top:20px;right:20px;z-index:200;background:var(--surface);border:1px solid var(--border);
  color:var(--gold);width:42px;height:42px;border-radius:50%;cursor:pointer;font-size:1rem;
  display:flex;align-items:center;justify-content:center;transition:all .3s;
  box-shadow:0 0 14px var(--glow-g),var(--card-s);
}
.theme-btn:hover{border-color:var(--gold);transform:scale(1.1) rotate(20deg)}

/* Page */
.page{
  position:relative;z-index:2;max-width:720px;margin:0 auto;padding:0 24px 100px;
  opacity:0;transform:translateY(14px);transition:opacity .9s ease .4s,transform .9s ease .4s;
}
.page.visible{opacity:1;transform:translateY(0)}

/* Hero */
.hero{padding:72px 0 52px;text-align:center}
.hero-rule{display:flex;align-items:center;gap:0;margin:0 auto 44px;max-width:440px}
.hero-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.hero-gem{width:7px;height:7px;background:var(--gold);transform:rotate(45deg);box-shadow:0 0 10px var(--gold);margin:0 12px;flex-shrink:0}
.crest{position:relative;display:inline-block;margin-bottom:32px}
.quincy-star{width:110px;height:110px;filter:drop-shadow(0 0 6px rgba(200,146,42,.35))}
.crest-glow{position:absolute;inset:-24px;border-radius:50%;background:radial-gradient(circle,rgba(200,146,42,.15) 0%,transparent 65%);animation:breath 4s ease-in-out infinite;pointer-events:none}
.eyebrow{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.6em;text-transform:uppercase;color:var(--ink-dim);display:block;margin-bottom:12px;animation:fadeIn .8s ease 1s both}
h1{font-family:'Cinzel Decorative',serif;font-size:clamp(2rem,7vw,3.4rem);font-weight:900;letter-spacing:.07em;text-transform:uppercase;
  background:linear-gradient(155deg,var(--gold-hot) 0%,var(--gold-lt) 35%,var(--gold) 65%,var(--gold-dim) 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 22px rgba(200,146,42,.35));line-height:1.05;
  animation:titleReveal 1.2s ease .6s both;
}
@keyframes titleReveal{from{opacity:0;letter-spacing:.4em;filter:blur(8px)}to{opacity:1;letter-spacing:.07em}}
.title-sub{font-family:'IM Fell English',serif;font-style:italic;font-size:.98rem;color:var(--ink-dim);letter-spacing:.16em;display:block;margin-top:12px;animation:fadeIn .8s ease 1.2s both}

/* Section label */
.section-label{
  font-family:'Cinzel',serif;font-size:.56rem;letter-spacing:.45em;text-transform:uppercase;color:var(--ink-dim);
  margin-bottom:16px;display:flex;align-items:center;gap:12px;
}
.section-label::before,.section-label::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

/* Cards */
.list{display:flex;flex-direction:column;gap:8px}
.card{
  display:block;text-decoration:none;color:var(--ink);background:var(--surface);border:1px solid var(--border);
  padding:18px 28px 18px 34px;overflow:hidden;
  clip-path:polygon(0 0,calc(100% - 16px) 0,100% 16px,100% 100%,16px 100%,0 calc(100% - 16px));
  transition:all .28s;box-shadow:var(--card-s);opacity:0;animation:cardIn .6s ease both;position:relative;
}
.card:nth-child(1){animation-delay:.1s}.card:nth-child(2){animation-delay:.2s}
.card:nth-child(3){animation-delay:.3s}.card:nth-child(4){animation-delay:.4s}
.card:nth-child(n+5){animation-delay:.5s}
@keyframes cardIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,transparent,var(--gold),transparent);opacity:0;transition:opacity .3s}
.card::after{content:'';position:absolute;top:-50%;left:-120%;width:55%;height:200%;background:linear-gradient(110deg,transparent,rgba(200,146,42,.06),transparent);transform:skewX(-20deg);transition:left .6s ease}
.card:hover{border-color:var(--gold);background:var(--surface2);box-shadow:0 0 26px var(--glow-g),var(--card-s);transform:translateX(10px)}
.card:hover::before{opacity:1}.card:hover::after{left:150%}
.card-corner{position:absolute;top:7px;right:7px;width:12px;height:12px;border-top:1px solid var(--gold-dim);border-right:1px solid var(--gold-dim);opacity:0;transition:opacity .3s}
.card:hover .card-corner{opacity:1}
.card-name{font-family:'Cinzel',serif;font-size:1rem;letter-spacing:.1em;text-transform:uppercase;color:var(--gold-lt);transition:all .3s}
.card:hover .card-name{color:var(--gold-hot);text-shadow:0 0 10px rgba(200,146,42,.5)}
.card-sub{font-size:.82rem;color:var(--ink-dim);font-style:italic;margin-top:4px;transition:color .3s}
.card:hover .card-sub{color:var(--ink-2)}
.card-arrow{position:absolute;right:20px;top:50%;transform:translateY(-50%) translateX(0);color:var(--gold);opacity:0;font-size:1rem;transition:all .25s}
.card:hover .card-arrow{opacity:1;transform:translateY(-50%) translateX(6px)}

.loading{font-family:'Cinzel',serif;letter-spacing:.3em;color:var(--ink-dim);text-align:center;padding:60px 0;animation:blink 1.6s ease-in-out infinite}

/* Footer */
.footer{
  text-align:center;margin-top:64px;padding-top:28px;border-top:1px solid var(--border);
  font-size:.6rem;color:var(--ink-dim);letter-spacing:.28em;text-transform:uppercase;font-family:'Cinzel',serif;
  opacity:0;animation:fadeIn 1s ease 1.5s both;position:relative;
}
.footer::before{content:'';position:absolute;top:-1px;left:20%;right:20%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.4}
.footer .sep{color:var(--gold);margin:0 10px;opacity:.5}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:560px){.hero{padding:52px 0 36px}.page{padding:0 16px 80px}h1{font-size:1.8rem}.card{padding:14px 20px 14px 24px}.crest-outer{width:84px;height:84px}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.1ms!important}}
</style>
</head>
<body>

<div id="portal">
  <div class="p-ring">
    <svg class="p-out" viewBox="0 0 120 120" fill="none">
      <polygon points="60,3 117,31 117,89 60,117 3,89 3,31" stroke="url(#g1)" stroke-width="1" fill="none" stroke-dasharray="5 4"/>
      <circle cx="60" cy="60" r="56" stroke="url(#g1)" stroke-width=".5" fill="none" opacity=".35" stroke-dasharray="2 8"/>
      <defs>
        <linearGradient id="g1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#c8922a"/><stop offset="50%" stop-color="#f2d078"/><stop offset="100%" stop-color="#c8922a"/>
        </linearGradient>
      </defs>
    </svg>
    <svg class="p-in" viewBox="0 0 88 88" fill="none" style="position:absolute;inset:16px;width:88px;height:88px;">
      <polygon points="44,3 85,23 85,65 44,85 3,65 3,23" stroke="url(#g2)" stroke-width=".8" fill="none"/>
      <defs>
        <linearGradient id="g2" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#f2d078"/><stop offset="100%" stop-color="#5a3e10"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="p-core"></div>
  </div>
  <div class="p-title">D&amp;D Bankai</div>
  <div class="p-sub">⧖ Abrindo o Grimório ⧖</div>
</div>

<canvas id="cosmos"></canvas>
<button class="theme-btn" id="theme-btn">☽</button>

<div class="page" id="page">
  <header class="hero">
    <div class="hero-rule"><div class="hero-line"></div><div class="hero-gem"></div><div class="hero-line"></div></div>
    <div class="crest">
      <div class="crest-glow"></div>
      <svg class="quincy-star" viewBox="0 0 160 160" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="qg1" x1="0" y1="0" x2="160" y2="160" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#f2d078"/>
            <stop offset="50%" stop-color="#c8922a"/>
            <stop offset="100%" stop-color="#f2d078"/>
          </linearGradient>
          <filter id="qglow">
            <feGaussianBlur stdDeviation="2.5" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Círculo externo -->
        <circle cx="80" cy="80" r="74" stroke="url(#qg1)" stroke-width="1" fill="none" opacity=".55"/>

        <!-- Círculo interno -->
        <circle cx="80" cy="80" r="60" stroke="url(#qg1)" stroke-width=".6" fill="none" opacity=".35"/>

        <!-- Estrela de 5 pontas Quincy (apontando para cima) -->
        <!-- Pontos da estrela: calculados com r_ext=58, r_int=24, 5 pontas, rotação -90° -->
        <polygon
          points="
            80,22
            91.756,54.636
            126.248,54.636
            98.246,74.364
            109.998,107
            80,87.272
            50.002,107
            61.754,74.364
            33.752,54.636
            68.244,54.636
          "
          stroke="url(#qg1)" stroke-width="1.2" fill="none" filter="url(#qglow)" opacity=".9"/>

        <!-- Cruz interna (detalhe Quincy) — linha vertical -->
        <line x1="80" y1="36" x2="80" y2="124" stroke="url(#qg1)" stroke-width=".7" opacity=".5"/>
        <!-- Cruz interna — linha horizontal -->
        <line x1="36" y1="80" x2="124" y2="80" stroke="url(#qg1)" stroke-width=".7" opacity=".5"/>

        <!-- Círculo central -->
        <circle cx="80" cy="80" r="11" stroke="url(#qg1)" stroke-width="1.2" fill="none" opacity=".85"/>
        <circle cx="80" cy="80" r="4"  fill="url(#qg1)" opacity=".7"/>

        <!-- 5 pequenos círculos nas pontas da estrela -->
        <circle cx="80"     cy="22"   r="2.2" fill="url(#qg1)" opacity=".7"/>
        <circle cx="126.25" cy="54.6" r="2.2" fill="url(#qg1)" opacity=".7"/>
        <circle cx="110"    cy="107"  r="2.2" fill="url(#qg1)" opacity=".7"/>
        <circle cx="50"     cy="107"  r="2.2" fill="url(#qg1)" opacity=".7"/>
        <circle cx="33.75"  cy="54.6" r="2.2" fill="url(#qg1)" opacity=".7"/>
      </svg>
    </div>
    <span class="eyebrow">Pergaminhos do Destino</span>
    <h1>D&amp;D Bankai</h1>
    <span class="title-sub">Grimório de Personagens</span>
  </header>

  <p class="section-label">Escolha seu herói</p>
  <div class="list" id="list"><div class="loading">⧖ Convocando heróis…</div></div>

  <footer class="footer">
    D&amp;D Bankai <span class="sep">✦</span> Que os dados sejam favoráveis <span class="sep">✦</span> Anno MMXXVI
  </footer>
</div>

<script>
(function(){
  const c=document.getElementById('cosmos'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  function cols(){return document.documentElement.getAttribute('data-theme')==='light'?['rgba(138,90,16,','rgba(168,120,48,','rgba(100,70,20,']:['rgba(200,146,42,','rgba(242,208,120,','rgba(90,62,16,']}
  for(let i=0;i<44;i++)ps.push({x:Math.random()*1400,y:Math.random()*900,r:Math.random()*1.3+.3,vx:(Math.random()-.5)*.18,vy:(Math.random()-.5)*.18,a:Math.random()*.3+.07,p:Math.random()*Math.PI*2,sp:Math.random()*.015+.005,ci:Math.floor(Math.random()*3)});
  function draw(){
    ctx.clearRect(0,0,W,H);const cl=cols();
    ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.p+=p.sp;if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;const a=p.a*(0.55+0.45*Math.sin(p.p));ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=cl[p.ci]+a+')';ctx.fill();});
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<75){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);ctx.strokeStyle=cols()[0]+(0.05*(1-d/75))+')';ctx.lineWidth=.35;ctx.stroke();}}
    requestAnimationFrame(draw);
  }
  draw();
})();

(function(){
  const btn=document.getElementById('theme-btn'),html=document.documentElement;
  const saved=localStorage.getItem('dnd-theme')||'dark';
  html.setAttribute('data-theme',saved);btn.textContent=saved==='dark'?'☀':'☽';
  btn.addEventListener('click',()=>{const n=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',n);btn.textContent=n==='dark'?'☀':'☽';localStorage.setItem('dnd-theme',n);});
})();

window.addEventListener('load',()=>{
  setTimeout(()=>{document.getElementById('portal').classList.add('out');document.getElementById('page').classList.add('visible');},1500);
});

fetch('manifest.json').then(r=>r.json()).then(list=>{
  const el=document.getElementById('list');
  if(!list.length){el.innerHTML='<p style="color:var(--ink-dim);text-align:center;padding:40px;font-style:italic;">Nenhum herói no grimório.</p>';return;}
  el.innerHTML=list.map(p=>`<a class="card" href="ficha.html?id=${p.id}"><div class="card-corner"></div><div class="card-name">${p.nome}</div><div class="card-sub">${p.subtitulo||''}</div><span class="card-arrow">⟶</span></a>`).join('');
}).catch(()=>{document.getElementById('list').innerHTML='<p style="color:var(--crimson-lt);text-align:center;padding:40px;font-family:Cinzel,serif;">✦ Erro ao abrir o grimório ✦</p>';});
</script>
</body>
</html>
