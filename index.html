<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Bankai — Fichas</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* =========================================================
   TOKENS — MODO ESCURO (padrão)
   ========================================================= */
:root,
[data-theme="dark"] {
  --bg:            #0d0b07;
  --bg2:           #161209;
  --bg3:           #1f1a10;
  --surface:       #211c11;
  --border:        #4a3a1a;
  --border-glow:   #c8952a;
  --ink:           #e8d9b5;
  --ink-dim:       #9a8a6a;
  --gold:          #c8952a;
  --gold-light:    #f0c060;
  --red:           #8b2020;
  --red-glow:      rgba(139,32,32,0.25);
  --parchment:     #1a1508;
  --shadow:        0 4px 32px rgba(0,0,0,0.7);
  --card-shadow:   0 2px 16px rgba(0,0,0,0.6);
  --rune-opacity:  0.04;
}

[data-theme="light"] {
  --bg:            #f4ede0;
  --bg2:           #ede3ce;
  --bg3:           #e5d9c0;
  --surface:       #faf4e8;
  --border:        #a8864a;
  --border-glow:   #8b6320;
  --ink:           #1a1006;
  --ink-dim:       #6a5030;
  --gold:          #8b6320;
  --gold-light:    #b07d28;
  --red:           #6b1515;
  --red-glow:      rgba(107,21,21,0.12);
  --parchment:     #f8f0dc;
  --shadow:        0 4px 32px rgba(100,70,20,0.18);
  --card-shadow:   0 2px 16px rgba(100,70,20,0.14);
  --rune-opacity:  0.06;
}

/* =========================================================
   RESET & BASE
   ========================================================= */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IM Fell English', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.4s ease, color 0.4s ease;
}

/* =========================================================
   RUNE BACKGROUND
   ========================================================= */
.rune-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

.rune-bg::before {
  content: "᚛ᚁᚂᚃᚄᚅᚆᚇᚈᚉᚊᚋᚌᚍᚎᚏᚐᚑᚒᚓᚔᚕᚖᚗᚘᚙᚚ᚜ ᚛ᚁᚂᚃᚄᚅᚆᚇᚈᚉᚊᚋᚌᚍᚎᚏᚐᚑᚒᚓᚔᚕᚖᚗᚘᚙᚚ᚜";
  position: absolute;
  top: 0; left: 0; right: 0;
  font-size: 1.4rem;
  letter-spacing: 0.6em;
  line-height: 3.2em;
  color: var(--gold);
  opacity: var(--rune-opacity);
  word-break: break-all;
  width: 100%;
  white-space: normal;
  padding: 20px;
}

/* =========================================================
   PAGE LAYOUT
   ========================================================= */
.page {
  position: relative;
  z-index: 1;
  max-width: 800px;
  margin: 0 auto;
  padding: 60px 28px 80px;
}

/* =========================================================
   THEME TOGGLE
   ========================================================= */
.theme-toggle {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 100;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--gold);
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.2rem;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.3s ease;
  box-shadow: var(--card-shadow);
}
.theme-toggle:hover {
  border-color: var(--gold);
  box-shadow: 0 0 14px var(--gold), var(--card-shadow);
  transform: scale(1.1);
}

/* =========================================================
   HEADER
   ========================================================= */
.site-header {
  text-align: center;
  margin-bottom: 52px;
  animation: fadeInDown 0.8s ease both;
}

.crest {
  display: block;
  margin: 0 auto 16px;
  width: 72px;
  height: 72px;
  opacity: 0;
  animation: fadeIn 1s ease 0.2s both;
}

.title-wrap {
  position: relative;
  display: inline-block;
}

h1 {
  font-family: 'Cinzel Decorative', 'Cinzel', serif;
  font-size: clamp(1.6rem, 5vw, 2.8rem);
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--gold);
  text-shadow: 0 0 30px rgba(200,149,42,0.5), 0 2px 8px rgba(0,0,0,0.8);
  transition: color 0.4s;
  line-height: 1.1;
}

.title-sub {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.9rem;
  color: var(--ink-dim);
  letter-spacing: .22em;
  text-transform: uppercase;
  display: block;
  margin-top: 6px;
  transition: color 0.4s;
}

.divider {
  display: flex;
  align-items: center;
  gap: 14px;
  margin: 22px auto 0;
  max-width: 420px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-glow), transparent);
}
.divider-gem {
  width: 8px;
  height: 8px;
  background: var(--gold);
  transform: rotate(45deg);
  box-shadow: 0 0 10px var(--gold);
  flex-shrink: 0;
  animation: pulse-gem 2.5s ease-in-out infinite;
}

@keyframes pulse-gem {
  0%, 100% { box-shadow: 0 0 6px var(--gold); transform: rotate(45deg) scale(1); }
  50%       { box-shadow: 0 0 18px var(--gold-light); transform: rotate(45deg) scale(1.3); }
}

/* =========================================================
   SECTION LABEL
   ========================================================= */
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 0.72rem;
  letter-spacing: .35em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 10px;
  animation: fadeIn 0.6s ease 0.5s both;
  transition: color 0.4s;
}
.section-label::before,
.section-label::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* =========================================================
   CARD LIST
   ========================================================= */
.list {
  display: flex;
  flex-direction: column;
  gap: 14px;
}

/* staggered entrance */
.card:nth-child(1) { animation-delay: 0.10s; }
.card:nth-child(2) { animation-delay: 0.20s; }
.card:nth-child(3) { animation-delay: 0.30s; }
.card:nth-child(4) { animation-delay: 0.40s; }
.card:nth-child(5) { animation-delay: 0.50s; }
.card:nth-child(n+6) { animation-delay: 0.55s; }

.card {
  display: block;
  position: relative;
  border: 1px solid var(--border);
  padding: 20px 24px 20px 28px;
  text-decoration: none;
  color: var(--ink);
  background: var(--surface);
  transition: border-color 0.25s, background 0.25s, box-shadow 0.25s, transform 0.2s;
  overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
  opacity: 0;
  animation: slideInLeft 0.5s ease both;
  box-shadow: var(--card-shadow);
}

/* gold left bar */
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, transparent, var(--gold), transparent);
  opacity: 0;
  transition: opacity 0.25s;
}

/* hover sheen */
.card::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(105deg, transparent 40%, rgba(200,149,42,0.06) 60%, transparent 70%);
  transform: translateX(-100%);
  transition: transform 0.5s ease;
}

.card:hover {
  border-color: var(--gold);
  background: var(--bg3);
  box-shadow: 0 0 20px rgba(200,149,42,0.18), var(--card-shadow);
  transform: translateX(6px);
}
.card:hover::before { opacity: 1; }
.card:hover::after  { transform: translateX(100%); }

.card-name {
  font-family: 'Cinzel', serif;
  font-size: 1.05rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold-light);
  transition: color 0.25s;
  position: relative;
}
.card:hover .card-name { color: var(--gold-light); text-shadow: 0 0 12px var(--gold); }

.card-sub {
  font-size: .82rem;
  color: var(--ink-dim);
  font-style: italic;
  margin-top: 5px;
  transition: color 0.25s;
  position: relative;
}
.card:hover .card-sub { color: var(--ink); }

.card-arrow {
  position: absolute;
  right: 20px;
  top: 50%;
  transform: translateY(-50%) translateX(0);
  color: var(--gold);
  opacity: 0;
  font-size: 1.2rem;
  transition: opacity 0.2s, transform 0.2s;
}
.card:hover .card-arrow { opacity: 1; transform: translateY(-50%) translateX(4px); }

/* =========================================================
   LOADING / ERROR STATE
   ========================================================= */
.loading {
  font-family: 'Cinzel', serif;
  letter-spacing: .2em;
  color: var(--ink-dim);
  text-align: center;
  padding: 40px 0;
  animation: blink 1.4s ease-in-out infinite;
}

@keyframes blink {
  0%, 100% { opacity: 1; }
  50%       { opacity: 0.3; }
}

/* =========================================================
   FOOTER
   ========================================================= */
.site-footer {
  text-align: center;
  margin-top: 56px;
  font-size: 0.75rem;
  color: var(--ink-dim);
  letter-spacing: .18em;
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  opacity: 0;
  animation: fadeIn 1s ease 1s both;
}
.site-footer .skull { font-size: 1rem; opacity: 0.4; }

/* =========================================================
   KEYFRAMES
   ========================================================= */
@keyframes fadeIn        { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInDown    { from { opacity: 0; transform: translateY(-24px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideInLeft   { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

/* =========================================================
   RESPONSIVE
   ========================================================= */
@media (max-width: 560px) {
  .page { padding: 44px 18px 60px; }
  h1    { font-size: 1.5rem; }
  .card { padding: 16px 18px 16px 22px; }
}

/* =========================================================
   REDUCED MOTION
   ========================================================= */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.1ms !important; }
}
</style>
</head>
<body>

<!-- Runic background texture -->
<div class="rune-bg" aria-hidden="true"></div>

<!-- Theme toggle -->
<button class="theme-toggle" id="theme-btn" title="Alternar tema" aria-label="Alternar entre modo claro e escuro">☽</button>

<div class="page">
  <!-- Header -->
  <header class="site-header">
    <!-- SVG crest / shield -->
    <svg class="crest" viewBox="0 0 72 80" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <path d="M36 4L68 18V44C68 60 52 72 36 76C20 72 4 60 4 44V18L36 4Z" fill="none" stroke="currentColor" stroke-width="2" style="color:var(--gold); filter: drop-shadow(0 0 6px var(--gold))"/>
      <path d="M36 14L58 24V42C58 54 48 63 36 66C24 63 14 54 14 42V24L36 14Z" fill="none" stroke="currentColor" stroke-width="1" style="color:var(--border-glow); opacity:0.5"/>
      <text x="36" y="48" text-anchor="middle" font-family="'Cinzel Decorative', serif" font-size="22" font-weight="900" fill="var(--gold)" style="filter:drop-shadow(0 0 4px var(--gold))">⚔</text>
    </svg>

    <div class="title-wrap">
      <h1>D&amp;D Bankai</h1>
      <span class="title-sub">Grimório de Personagens</span>
    </div>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-line"></div>
    </div>
  </header>

  <!-- Character list -->
  <p class="section-label">Escolha seu herói</p>
  <div class="list" id="list">
    <div class="loading">⧖ Convocando heróis…</div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <span class="skull">☠</span>
    &nbsp;D&amp;D Bankai &mdash; Que os dados sejam favoráveis&nbsp;
    <span class="skull">☠</span>
  </footer>
</div>

<script>
// ---- Theme toggle ----
(function() {
  const btn   = document.getElementById('theme-btn');
  const html  = document.documentElement;
  const saved = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', saved);
  btn.textContent = saved === 'dark' ? '☀' : '☽';

  btn.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀' : '☽';
    localStorage.setItem('theme', next);
  });
})();

// ---- Load characters ----
fetch('manifest.json')
  .then(r => r.json())
  .then(personagens => {
    const list = document.getElementById('list');
    if (!personagens.length) {
      list.innerHTML = '<p style="color:var(--ink-dim);text-align:center;padding:32px;font-style:italic;">Nenhum herói encontrado no grimório.</p>';
      return;
    }
    list.innerHTML = personagens.map(p => `
      <a class="card" href="ficha.html?id=${p.id}">
        <div class="card-name">${p.nome}</div>
        <div class="card-sub">${p.subtitulo || ''}</div>
        <span class="card-arrow" aria-hidden="true">⟶</span>
      </a>
    `).join('');
  })
  .catch(() => {
    document.getElementById('list').innerHTML =
      '<p style="color:var(--red);text-align:center;padding:32px;font-family:\'Cinzel\',serif;letter-spacing:.1em;">✦ Erro ao convocar o grimório ✦</p>';
  });
</script>
</body>
</html>
