<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasos — Escritores</title>
  <link rel="stylesheet" href="assets/styles.css">
  <style>
    .index-wrap {
      max-width: 680px; margin: 0 auto;
      padding: 80px 20px 60px;
      position: relative; z-index: 1;
    }
    .index-title {
      font-family: 'Cinzel Decorative', serif;
      font-size: clamp(2rem, 7vw, 3.2rem);
      color: var(--ink); letter-spacing: .06em;
      text-align: center; margin-bottom: 6px;
    }
    .index-sub {
      font-family: 'Cinzel', serif; font-size: .55rem;
      letter-spacing: .3em; text-transform: uppercase;
      color: var(--gold); text-align: center; margin-bottom: 48px;
    }
    .char-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 24px; }
    .char-entry {
      display: flex; align-items: center; gap: 14px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 14px 18px; text-decoration: none;
      clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 10px 100%, 0 calc(100% - 10px));
      transition: border-color .2s, box-shadow .2s;
    }
    .char-entry:hover { border-color: var(--gold); box-shadow: 0 0 14px var(--glow-g); }
    .char-entry-icon { color: var(--gold); font-size: 1rem; }
    .char-entry-name {
      flex: 1; font-family: 'Cinzel', serif; font-size: .85rem;
      color: var(--ink); letter-spacing: .05em;
    }
    .char-entry-sub { font-size: .7rem; color: var(--ink-dim); }
    .char-entry-del {
      background: transparent; border: none; color: var(--ink-dim);
      cursor: pointer; font-size: .7rem; padding: 4px 8px; transition: color .2s;
    }
    .char-entry-del:hover { color: var(--crimson-lt); }
    .char-entry-edit {
      background: transparent; border: none; color: var(--ink-dim);
      cursor: pointer; font-size: .7rem; padding: 4px 6px; transition: color .2s;
      opacity: 0; transition: opacity .15s, color .15s;
    }
    .char-entry:hover .char-entry-edit { opacity: 1; }
    .char-entry-edit:hover { color: var(--gold-lt); }
    /* Modo edição inline */
    .char-entry.editing { border-color: var(--gold); }
    .char-name-input {
      flex: 1; background: transparent; border: none; border-bottom: 1px solid var(--gold);
      color: var(--ink); font-family: 'Cinzel', serif; font-size: .85rem;
      letter-spacing: .05em; outline: none; padding: 2px 0; width: 100%;
    }
    .new-char-form {
      display: flex; gap: 8px; margin-top: 8px;
    }
    .new-char-input {
      flex: 1; background: var(--surface); border: 1px solid var(--border);
      color: var(--ink); font-family: 'IM Fell English', serif;
      font-size: .9rem; padding: 10px 14px; outline: none;
    }
    .new-char-input:focus { border-color: var(--gold); }
    .new-char-btn {
      background: var(--gold-dim); border: 1px solid var(--gold);
      color: var(--gold); font-family: 'Cinzel', serif;
      font-size: .52rem; letter-spacing: .18em; text-transform: uppercase;
      padding: 10px 20px; cursor: pointer; transition: all .2s;
      clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 6px, 100% 100%, 6px 100%, 0 calc(100% - 6px));
    }
    .new-char-btn:hover { background: var(--gold); color: var(--bg); }
    .index-empty {
      font-family: 'Cinzel', serif; font-size: .55rem;
      letter-spacing: .18em; color: var(--ink-dim);
      text-align: center; padding: 32px 0; text-transform: uppercase;
    }
    .index-quote {
      font-family: 'IM Fell English', serif; font-size: .85rem;
      color: var(--ink-dim); font-style: italic;
      text-align: center; margin-top: 48px; line-height: 1.7;
      border-top: 1px solid var(--border); padding-top: 24px;
    }
  </style>
</head>
<body>
  <button id="theme-btn" title="Alternar tema" onclick="toggleTheme()">☽</button>

  <div class="index-wrap">
    <h1 class="index-title">Phantasos</h1>
    <div class="index-sub">Contos Distorcidos · Escritores</div>
    <div style="text-align:center;margin-bottom:24px;">
      <button onclick="abrirMestre()" style="font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);background:transparent;cursor:pointer;border:1px solid var(--gold-dim);padding:8px 20px;display:inline-block;transition:all .2s;" onmouseover="this.style.borderColor='var(--gold)'" onmouseout="this.style.borderColor='var(--gold-dim)'">🔮 Jardim do Mestre</button>
    </div>

    <div class="char-list" id="char-list"></div>

    <div class="new-char-form">
      <input type="text" class="new-char-input" id="new-name" placeholder="Nome do novo escritor…" maxlength="40">
      <button class="new-char-btn" onclick="addChar()">Criar</button>
    </div>

    <div class="index-quote">
      "Há coisas que você escreveu que não lembra mais.<br>
      Você achava que tinham ido embora.<br>
      Não foram."
    </div>
  </div>

  <script>
    function toggleTheme() {
      const html = document.documentElement;
      const next = html.dataset.theme === 'dark' ? 'light' : 'dark';
      html.dataset.theme = next;
      document.getElementById('theme-btn').textContent = next === 'dark' ? '☽' : '☀';
      localStorage.setItem('phantasos-theme', next);
    }
    const savedTheme = localStorage.getItem('phantasos-theme');
    if (savedTheme) {
      document.documentElement.dataset.theme = savedTheme;
      document.getElementById('theme-btn').textContent = savedTheme === 'dark' ? '☽' : '☀';
    }

    function slugify(s) {
      return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')
        .replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
    }

    let _chars = [];

    async function loadChars() {
      const el = document.getElementById('char-list');
      el.innerHTML = '<div class="index-empty">Carregando…</div>';
      try {
        // Busca manifest estático + manifest dinâmico (Redis)
        let base = [];
        let dynamic = [];
        try { base = await fetch('manifest.json').then(r => r.json()); } catch {}
        try {
          const r = await fetch('/api/manifest');
          if (r.ok) dynamic = await r.json();
        } catch {}
        const baseIds = new Set(base.map(p => p.id));
        _chars = [...base, ...dynamic.filter(p => !baseIds.has(p.id))];
      } catch {
        _chars = [];
      }
      renderList();
    }

    function renderList() {
      const el = document.getElementById('char-list');
      if (!_chars.length) {
        el.innerHTML = '<div class="index-empty">Nenhum escritor criado ainda.</div>';
        return;
      }
      el.innerHTML = _chars.map((c) => `
        <a href="ficha.html?id=${encodeURIComponent(c.id)}" class="char-entry" id="entry-${c.id}">
          <span class="char-entry-icon">✒</span>
          <div style="flex:1;min-width:0">
            <div class="char-entry-name" id="name-display-${c.id}">${c.nome}</div>
            <div class="char-entry-sub">${c.id}</div>
          </div>
          <button class="char-entry-edit" onclick="startEdit(event,'${c.id}')" title="Editar nome">✎</button>
          <button class="char-entry-del" onclick="delChar(event,'${c.id}','${c.nome.replace(/'/g,"\'")}')" title="Remover">✕</button>
        </a>
      `).join('');
    }

    function startEdit(e, id) {
      e.preventDefault(); e.stopPropagation();
      const entry = document.getElementById('entry-' + id);
      const nameDisplay = document.getElementById('name-display-' + id);
      const currentName = nameDisplay.textContent;
      entry.classList.add('editing');
      nameDisplay.outerHTML = `<input class="char-name-input" id="name-input-${id}"
        value="${currentName.replace(/"/g,'&quot;')}"
        onclick="event.preventDefault();event.stopPropagation()"
        onkeydown="handleEditKey(event,'${id}')"
        onblur="confirmEdit('${id}')">`;
      const inp = document.getElementById('name-input-' + id);
      inp.focus(); inp.select();
    }

    function handleEditKey(e, id) {
      e.stopPropagation();
      if (e.key === 'Enter')  { e.preventDefault(); confirmEdit(id); }
      if (e.key === 'Escape') { e.preventDefault(); cancelEdit(id); }
    }

    async function confirmEdit(id) {
      const inp = document.getElementById('name-input-' + id);
      if (!inp) return;
      const novoNome = inp.value.trim();
      const char = _chars.find(c => c.id === id);
      if (!novoNome || novoNome === char?.nome) { cancelEdit(id); return; }
      inp.disabled = true;
      try {
        const r = await fetch(`/api/manifest?id=${encodeURIComponent(id)}`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome: novoNome })
        });
        if (!r.ok) throw new Error();
        if (char) char.nome = novoNome;
        renderList();
      } catch { cancelEdit(id); }
    }

    function cancelEdit(id) {
      const char = _chars.find(c => c.id === id);
      if (!char) return;
      const inp = document.getElementById('name-input-' + id);
      if (inp) inp.outerHTML = `<div class="char-entry-name" id="name-display-${id}">${char.nome}</div>`;
      document.getElementById('entry-' + id)?.classList.remove('editing');
    }

    function isStatic(id) {
      return false;
    }

    async function addChar() {
      const input = document.getElementById('new-name');
      const nome = input.value.trim();
      if (!nome) return;
      const btn = document.querySelector('.new-char-btn');
      btn.textContent = '…';
      btn.disabled = true;
      try {
        const r = await fetch('/api/manifest', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nome })
        });
        if (!r.ok) {
          const err = await r.json();
          alert('Erro ao criar escritor: ' + (err.error || r.status));
          return;
        }
        input.value = '';
        await loadChars();
      } catch {
        alert('Erro de conexão ao criar escritor.');
      } finally {
        btn.textContent = 'Criar';
        btn.disabled = false;
      }
    }

    async function delChar(e, id, nome, estatico) {
      e.preventDefault(); e.stopPropagation();
      if (estatico) { alert('Este personagem é parte do catálogo oficial e não pode ser removido.'); return; }
      if (!confirm(`Remover "${nome}" permanentemente?`)) return;
      try {
        const r = await fetch(`/api/manifest?id=${encodeURIComponent(id)}`, { method: 'DELETE' });
        if (!r.ok) {
          const err = await r.json();
          alert('Erro ao remover: ' + (err.error || r.status));
          return;
        }
        await loadChars();
      } catch {
        alert('Erro de conexão ao remover escritor.');
      }
    }

    document.getElementById('new-name').addEventListener('keydown', e => {
      if (e.key === 'Enter') addChar();
    });

    function abrirMestre() {
      const SENHA = 'phantasos';
      const tentativa = prompt('🔮 Senha do Mestre:');
      if (tentativa === null) return;
      if (tentativa.trim().toLowerCase() === SENHA) {
        localStorage.setItem('phantasos-mestre-auth', '1');
        window.location.href = 'mestre.html';
      } else {
        alert('Senha incorreta.');
      }
    }
    window.abrirMestre = abrirMestre;

    loadChars();
  </script>
</body>
</html>
