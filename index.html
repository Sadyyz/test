<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Bankai — Grimório</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;900&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ====== TOKENS ====== */
:root, [data-theme="dark"] {
  --bg:           #070509;
  --bg2:          #0d0a10;
  --bg3:          #120e18;
  --surface:      #16121e;
  --surface2:     #1d1828;
  --border:       #3a2a50;
  --border-glow:  #7c4dff;
  --ink:          #e2d4f0;
  --ink-dim:      #8a7aaa;
  --gold:         #b388ff;
  --gold-light:   #d4b8ff;
  --gold-hot:     #ea80ff;
  --red:          #ff4d6d;
  --red-glow:     rgba(255,77,109,0.25);
  --cyan:         #40c4ff;
  --green:        #69f0ae;
  --shadow:       0 8px 48px rgba(0,0,0,0.9);
  --card-shadow:  0 4px 24px rgba(0,0,0,0.7);
  --glow-purple:  rgba(124,77,255,0.3);
  --rune-opacity: 0.035;
  --particle:     #b388ff;
}
[data-theme="light"] {
  --bg:           #f0eaf8;
  --bg2:          #e8e0f5;
  --bg3:          #ddd4ee;
  --surface:      #faf6ff;
  --surface2:     #f3ecff;
  --border:       #9c7dca;
  --border-glow:  #6a1b9a;
  --ink:          #1a0a2e;
  --ink-dim:      #5a4070;
  --gold:         #6a1b9a;
  --gold-light:   #8e24aa;
  --gold-hot:     #ab47bc;
  --red:          #c62828;
  --red-glow:     rgba(198,40,40,0.15);
  --cyan:         #0277bd;
  --green:        #1b5e20;
  --shadow:       0 8px 48px rgba(80,0,120,0.12);
  --card-shadow:  0 4px 24px rgba(80,0,120,0.10);
  --glow-purple:  rgba(106,27,154,0.12);
  --rune-opacity: 0.05;
  --particle:     #6a1b9a;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'IM Fell English', Georgia, serif;
  min-height: 100vh;
  overflow-x: hidden;
  transition: background 0.5s, color 0.5s;
}

/* ====== CANVAS BACKGROUND (partículas) ====== */
#cosmos {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ====== RUNE OVERLAY ====== */
.rune-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 1;
  overflow: hidden;
  mask-image: radial-gradient(ellipse at center, transparent 20%, black 80%);
  -webkit-mask-image: radial-gradient(ellipse at center, transparent 20%, black 80%);
}
.rune-bg::before {
  content: "᚛ᚁᚂᚃᚄᚅᚆᚇᚈᚉᚊᚋᚌᚍᚎᚏᚐᚑᚒᚓᚔᚕᚖᚗᚘᚙᚚ᚜ ᚛ᚁᚂᚃᚄᚅᚆᚇᚈᚉᚊᚋᚌᚍᚎᚏᚐᚑᚒᚓᚔᚕᚖᚗᚘᚙᚚ᚜";
  position: absolute;
  top: 0; left: 0; right: 0;
  font-size: 1.6rem;
  letter-spacing: .8em;
  line-height: 3.5em;
  color: var(--gold);
  opacity: var(--rune-opacity);
  word-break: break-all;
  width: 100%;
  white-space: normal;
  padding: 30px;
  animation: runeShift 40s linear infinite;
}
@keyframes runeShift {
  0%   { transform: translateY(0) translateX(0); }
  50%  { transform: translateY(-3%) translateX(1%); }
  100% { transform: translateY(0) translateX(0); }
}

/* ====== PORTAL DE INVOCAÇÃO (loading screen) ====== */
#portal-screen {
  position: fixed;
  inset: 0;
  z-index: 999;
  background: var(--bg);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
#portal-screen.fade-out { opacity: 0; visibility: hidden; }

.portal-ring {
  position: relative;
  width: 120px;
  height: 120px;
}
.portal-ring svg {
  width: 100%;
  height: 100%;
  animation: portalSpin 3s linear infinite;
}
@keyframes portalSpin { to { transform: rotate(360deg); } }
.portal-inner {
  position: absolute;
  inset: 20px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--gold-hot) 0%, var(--gold) 40%, transparent 70%);
  opacity: 0.6;
  animation: portalPulse 1.5s ease-in-out infinite;
}
@keyframes portalPulse { 0%,100%{transform:scale(0.8);opacity:0.4} 50%{transform:scale(1.1);opacity:0.8} }

.portal-text {
  font-family: 'Cinzel', serif;
  font-size: 0.75rem;
  letter-spacing: .4em;
  text-transform: uppercase;
  color: var(--ink-dim);
  animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

/* ====== THEME TOGGLE ====== */
.theme-toggle {
  position: fixed;
  top: 20px; right: 20px;
  z-index: 200;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--gold);
  width: 48px; height: 48px;
  border-radius: 50%;
  cursor: pointer;
  font-size: 1.3rem;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.35s;
  box-shadow: 0 0 20px var(--glow-purple), var(--card-shadow);
}
.theme-toggle:hover {
  border-color: var(--gold);
  box-shadow: 0 0 30px var(--gold), var(--card-shadow);
  transform: scale(1.12) rotate(15deg);
}

/* ====== PAGE ====== */
.page {
  position: relative;
  z-index: 2;
  max-width: 820px;
  margin: 0 auto;
  padding: 70px 24px 100px;
  opacity: 0;
  transform: translateY(20px);
  transition: opacity 0.8s ease 0.3s, transform 0.8s ease 0.3s;
}
.page.visible { opacity: 1; transform: translateY(0); }

/* ====== HEADER ====== */
.site-header {
  text-align: center;
  margin-bottom: 60px;
  position: relative;
}

/* Sigil / Mandala central */
.sigil-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 28px;
}
.sigil-outer {
  width: 110px; height: 110px;
  animation: sigil-spin-slow 20s linear infinite;
}
.sigil-inner {
  position: absolute;
  inset: 22px;
  animation: sigil-spin-slow 12s linear infinite reverse;
}
@keyframes sigil-spin-slow { to { transform: rotate(360deg); } }

.sigil-glow {
  position: absolute;
  inset: -20px;
  border-radius: 50%;
  background: radial-gradient(circle, var(--gold-hot) 0%, transparent 65%);
  opacity: 0.18;
  animation: portalPulse 3s ease-in-out infinite;
  pointer-events: none;
}

h1 {
  font-family: 'Cinzel Decorative', serif;
  font-size: clamp(1.8rem, 6vw, 3.2rem);
  font-weight: 900;
  letter-spacing: .12em;
  text-transform: uppercase;
  background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold-hot) 50%, var(--gold) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 20px var(--gold));
  line-height: 1.1;
  animation: titleReveal 1s ease 0.5s both;
}
@keyframes titleReveal {
  from { opacity: 0; filter: blur(10px) drop-shadow(0 0 20px var(--gold)); letter-spacing: .4em; }
  to   { opacity: 1; filter: drop-shadow(0 0 20px var(--gold)); letter-spacing: .12em; }
}

.title-sub {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.92rem;
  color: var(--ink-dim);
  letter-spacing: .28em;
  text-transform: uppercase;
  display: block;
  margin-top: 10px;
  animation: fadeIn 1s ease 1s both;
}

/* Divisor arcano */
.divider {
  display: flex;
  align-items: center;
  gap: 16px;
  margin: 28px auto 0;
  max-width: 480px;
}
.divider-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--gold), transparent);
  position: relative;
  overflow: visible;
}
.divider-line::after {
  content: '';
  position: absolute;
  inset: -1px 0;
  background: linear-gradient(90deg, transparent, var(--gold-hot), transparent);
  opacity: 0;
  animation: linePulse 3s ease-in-out infinite;
}
@keyframes linePulse { 0%,100%{opacity:0} 50%{opacity:0.7} }

.divider-star {
  position: relative;
  color: var(--gold);
  font-size: 1.1rem;
  animation: starGlow 2s ease-in-out infinite;
}
@keyframes starGlow {
  0%,100% { text-shadow: 0 0 6px var(--gold); transform: scale(1) rotate(0deg); }
  50%      { text-shadow: 0 0 20px var(--gold-hot); transform: scale(1.2) rotate(180deg); }
}

/* ====== SECTION LABEL ====== */
.section-label {
  font-family: 'Cinzel', serif;
  font-size: 0.65rem;
  letter-spacing: .45em;
  text-transform: uppercase;
  color: var(--ink-dim);
  margin-bottom: 22px;
  display: flex;
  align-items: center;
  gap: 14px;
  animation: fadeIn 0.6s ease both;
}
.section-label::before,
.section-label::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* ====== CARD LIST ====== */
.list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

.card {
  display: block;
  position: relative;
  text-decoration: none;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--border);
  padding: 22px 28px 22px 32px;
  overflow: hidden;
  clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
  transition: border-color .3s, background .3s, box-shadow .3s, transform .25s;
  box-shadow: var(--card-shadow);
  opacity: 0;
  animation: cardAppear 0.6s ease both;
}
.card:nth-child(1){animation-delay:.1s} .card:nth-child(2){animation-delay:.2s}
.card:nth-child(3){animation-delay:.3s} .card:nth-child(4){animation-delay:.4s}
.card:nth-child(5){animation-delay:.5s} .card:nth-child(n+6){animation-delay:.55s}

@keyframes cardAppear {
  from { opacity:0; transform: translateX(-24px) skewX(-2deg); }
  to   { opacity:1; transform: translateX(0) skewX(0deg); }
}

/* Barra lateral luminosa */
.card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: linear-gradient(180deg, transparent, var(--gold-hot), var(--gold), transparent);
  opacity: 0;
  transition: opacity .3s;
}

/* Efeito de scan */
.card::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -100%;
  width: 60%;
  height: 200%;
  background: linear-gradient(110deg, transparent, rgba(179,136,255,0.08), transparent);
  transform: skewX(-20deg);
  transition: left 0.6s ease;
}
.card:hover { border-color: var(--gold); background: var(--surface2); box-shadow: 0 0 28px var(--glow-purple), var(--card-shadow); transform: translateX(8px); }
.card:hover::before { opacity: 1; }
.card:hover::after  { left: 150%; }

/* Corner ornament */
.card-corner {
  position: absolute;
  top: 6px; right: 6px;
  width: 12px; height: 12px;
  border-top: 1px solid var(--border-glow);
  border-right: 1px solid var(--border-glow);
  opacity: 0;
  transition: opacity .3s;
}
.card:hover .card-corner { opacity: 1; }

.card-name {
  font-family: 'Cinzel', serif;
  font-size: 1.08rem;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold-light);
  transition: all .3s;
  position: relative;
}
.card:hover .card-name {
  color: var(--gold-hot);
  text-shadow: 0 0 14px var(--gold);
}

.card-sub {
  font-size: .83rem;
  color: var(--ink-dim);
  font-style: italic;
  margin-top: 5px;
  transition: color .3s;
  position: relative;
}
.card:hover .card-sub { color: var(--ink); }

.card-arrow {
  position: absolute;
  right: 22px; top: 50%;
  transform: translateY(-50%) translateX(0);
  color: var(--gold);
  opacity: 0;
  font-size: 1.2rem;
  transition: opacity .25s, transform .25s;
}
.card:hover .card-arrow { opacity: 1; transform: translateY(-50%) translateX(5px); }

/* ====== LOADING ====== */
.loading {
  font-family: 'Cinzel', serif;
  letter-spacing: .25em;
  color: var(--ink-dim);
  text-align: center;
  padding: 48px 0;
  animation: blink 1.4s ease-in-out infinite;
}

/* ====== FOOTER ====== */
.site-footer {
  text-align: center;
  margin-top: 64px;
  font-size: 0.72rem;
  color: var(--ink-dim);
  letter-spacing: .22em;
  text-transform: uppercase;
  font-family: 'Cinzel', serif;
  opacity: 0;
  animation: fadeIn 1s ease 1.2s both;
}
.site-footer .sep { color: var(--gold); margin: 0 10px; opacity: 0.6; }

/* ====== KEYFRAMES ====== */
@keyframes fadeIn { from{opacity:0} to{opacity:1} }

/* ====== RESPONSIVE ====== */
@media (max-width: 560px) {
  .page { padding: 50px 16px 70px; }
  h1 { font-size: 1.6rem; }
  .card { padding: 18px 20px 18px 24px; }
  .sigil-outer { width: 80px; height: 80px; }
}

@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.1ms !important; }
}
</style>
</head>
<body>

<!-- Loading portal -->
<div id="portal-screen">
  <div class="portal-ring">
    <svg viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="55" stroke="url(#pg1)" stroke-width="1.5" stroke-dasharray="8 4"/>
      <circle cx="60" cy="60" r="44" stroke="url(#pg2)" stroke-width="1" stroke-dasharray="3 8"/>
      <defs>
        <linearGradient id="pg1" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#b388ff"/>
          <stop offset="50%" stop-color="#ea80ff"/>
          <stop offset="100%" stop-color="#40c4ff"/>
        </linearGradient>
        <linearGradient id="pg2" x1="120" y1="0" x2="0" y2="120" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#ea80ff"/>
          <stop offset="100%" stop-color="#b388ff"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="portal-inner"></div>
  </div>
  <div class="portal-text">⧖ Abrindo o Portal ⧖</div>
</div>

<!-- Canvas partículas -->
<canvas id="cosmos"></canvas>

<!-- Rune overlay -->
<div class="rune-bg" aria-hidden="true"></div>

<!-- Theme toggle -->
<button class="theme-toggle" id="theme-btn" title="Alternar tema" aria-label="Alternar entre modo claro e escuro">☽</button>

<div class="page" id="page">
  <!-- Header -->
  <header class="site-header">
    <!-- Sigil animado -->
    <div class="sigil-wrap">
      <div class="sigil-glow"></div>
      <svg class="sigil-outer" viewBox="0 0 110 110" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="55,5 105,30 105,80 55,105 5,80 5,30" stroke="url(#sg1)" stroke-width="1.5" fill="none" stroke-dasharray="6 3"/>
        <circle cx="55" cy="55" r="50" stroke="url(#sg1)" stroke-width="0.6" fill="none" opacity="0.4" stroke-dasharray="2 6"/>
        <defs>
          <linearGradient id="sg1" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#b388ff"/>
            <stop offset="50%" stop-color="#ea80ff"/>
            <stop offset="100%" stop-color="#40c4ff"/>
          </linearGradient>
        </defs>
      </svg>
      <svg class="sigil-inner" viewBox="0 0 66 66" fill="none" xmlns="http://www.w3.org/2000/svg" style="position:absolute;inset:22px;width:66px;height:66px;">
        <polygon points="33,3 63,18 63,48 33,63 3,48 3,18" stroke="url(#sg2)" stroke-width="1" fill="none"/>
        <text x="33" y="39" text-anchor="middle" font-family="'Cinzel Decorative', serif" font-size="20" font-weight="900" fill="url(#sg2)" style="filter:drop-shadow(0 0 8px #b388ff)">⚔</text>
        <defs>
          <linearGradient id="sg2" x1="0" y1="0" x2="66" y2="66" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#ea80ff"/>
            <stop offset="100%" stop-color="#40c4ff"/>
          </linearGradient>
        </defs>
      </svg>
    </div>

    <div>
      <h1>D&amp;D Bankai</h1>
      <span class="title-sub">Grimório de Personagens</span>
    </div>

    <div class="divider" aria-hidden="true">
      <div class="divider-line"></div>
      <span class="divider-star">✦</span>
      <div class="divider-line"></div>
    </div>
  </header>

  <!-- Character list -->
  <p class="section-label">Escolha seu herói</p>
  <div class="list" id="list">
    <div class="loading">⧖ Convocando heróis…</div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    D&amp;D Bankai <span class="sep">✦</span> Que os dados sejam favoráveis <span class="sep">✦</span> ☠
  </footer>
</div>

<script>
// ---- Partículas arcanas ----
(function() {
  const canvas = document.getElementById('cosmos');
  const ctx = canvas.getContext('2d');
  let W, H, particles = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // Detecta cor do tema
  function particleColor() {
    return document.documentElement.getAttribute('data-theme') === 'light'
      ? ['rgba(106,27,154,','rgba(171,71,188,','rgba(2,119,189,']
      : ['rgba(179,136,255,','rgba(234,128,255,','rgba(64,196,255,'];
  }

  for (let i = 0; i < 55; i++) spawnParticle();

  function spawnParticle() {
    particles.push({
      x: Math.random() * (W || 1200),
      y: Math.random() * (H || 800),
      r: Math.random() * 1.8 + 0.4,
      vx: (Math.random() - 0.5) * 0.3,
      vy: (Math.random() - 0.5) * 0.3,
      alpha: Math.random() * 0.5 + 0.15,
      pulse: Math.random() * Math.PI * 2,
      pulseSpeed: Math.random() * 0.02 + 0.008,
      colorIdx: Math.floor(Math.random() * 3)
    });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    const colors = particleColor();
    particles.forEach(p => {
      p.x += p.vx; p.y += p.vy;
      p.pulse += p.pulseSpeed;
      if (p.x < -5) p.x = W+5;
      if (p.x > W+5) p.x = -5;
      if (p.y < -5) p.y = H+5;
      if (p.y > H+5) p.y = -5;
      const a = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = colors[p.colorIdx] + a + ')';
      ctx.fill();
    });
    // conexões entre partículas próximas
    for (let i = 0; i < particles.length; i++) {
      for (let j = i+1; j < particles.length; j++) {
        const dx = particles[i].x - particles[j].x;
        const dy = particles[i].y - particles[j].y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        if (dist < 90) {
          ctx.beginPath();
          ctx.moveTo(particles[i].x, particles[i].y);
          ctx.lineTo(particles[j].x, particles[j].y);
          ctx.strokeStyle = colors[0] + (0.07 * (1 - dist/90)) + ')';
          ctx.lineWidth = 0.5;
          ctx.stroke();
        }
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ---- Theme toggle ----
(function() {
  const btn  = document.getElementById('theme-btn');
  const html = document.documentElement;
  const saved = localStorage.getItem('theme') || 'dark';
  html.setAttribute('data-theme', saved);
  btn.textContent = saved === 'dark' ? '☀' : '☽';
  btn.addEventListener('click', () => {
    const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    btn.textContent = next === 'dark' ? '☀' : '☽';
    localStorage.setItem('theme', next);
  });
})();

// ---- Portal de loading ----
window.addEventListener('load', () => {
  setTimeout(() => {
    document.getElementById('portal-screen').classList.add('fade-out');
    document.getElementById('page').classList.add('visible');
  }, 1400);
});

// ---- Carregar personagens ----
fetch('manifest.json')
  .then(r => r.json())
  .then(personagens => {
    const list = document.getElementById('list');
    if (!personagens.length) {
      list.innerHTML = '<p style="color:var(--ink-dim);text-align:center;padding:40px;font-style:italic;">Nenhum herói encontrado no grimório.</p>';
      return;
    }
    list.innerHTML = personagens.map(p => `
      <a class="card" href="ficha.html?id=${p.id}">
        <div class="card-corner"></div>
        <div class="card-name">${p.nome}</div>
        <div class="card-sub">${p.subtitulo || ''}</div>
        <span class="card-arrow" aria-hidden="true">⟶</span>
      </a>
    `).join('');
  })
  .catch(() => {
    document.getElementById('list').innerHTML =
      '<p style="color:var(--red);text-align:center;padding:40px;font-family:\'Cinzel\',serif;letter-spacing:.12em;">✦ Erro ao convocar o grimório ✦</p>';
  });
</script>
</body>
</html>
