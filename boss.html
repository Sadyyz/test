<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Boss — D&D Bankai</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0a0809;--bg2:#100d12;--surface:#161219;--surface2:#1e1825;
  --border:#2c2238;--ink:#ede0c8;--ink-2:#b8a890;--ink-dim:#6a5a48;
  --gold:#c8922a;--gold-lt:#e8be68;--gold-hot:#f2d078;--gold-dim:#5a3e10;
  --crimson:#7a1828;--crimson-lt:#b83040;--crimson-glow:rgba(122,24,40,.25);
  --glow-g:rgba(200,146,42,.2);--card-s:0 2px 20px rgba(0,0,0,.75);
  --rune-op:.018;
}
[data-theme="light"]{
  --bg:#f4ede0;--bg2:#ece4d4;--surface:#fdf8f0;--surface2:#f5eddc;
  --border:#c8a870;--ink:#18100a;--ink-2:#5a4030;--ink-dim:#8a6a50;
  --gold:#8a5a10;--gold-lt:#aa7830;--gold-hot:#7a4808;--gold-dim:#e8d4b0;
  --crimson:#6a0f1e;--crimson-lt:#9a1830;--crimson-glow:rgba(106,15,30,.12);
  --glow-g:rgba(138,90,16,.1);--card-s:0 2px 20px rgba(60,30,0,.08);
  --rune-op:.035;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);font-family:'IM Fell English',Georgia,serif;
  min-height:100vh;overflow-x:hidden;transition:background .5s,color .5s;
}
body::before{
  content:"ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ";
  position:fixed;inset:0;font-size:1.4rem;letter-spacing:.6em;line-height:4em;
  color:var(--crimson);opacity:var(--rune-op);word-break:break-all;pointer-events:none;z-index:0;padding:32px;
  animation:runeShift 70s linear infinite;
}
@keyframes runeShift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4%)}}

#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Portal */
#portal-screen{
  position:fixed;inset:0;z-index:999;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;
  transition:opacity .9s ease,visibility .9s ease;
}
#portal-screen.fade-out{opacity:0;visibility:hidden}
.p-ring{position:relative;width:110px;height:110px}
.p-outer{position:absolute;inset:0;animation:spinCW 8s linear infinite}
.p-inner{position:absolute;inset:16px;animation:spinCCW 5s linear infinite}
@keyframes spinCW{to{transform:rotate(360deg)}}
@keyframes spinCCW{to{transform:rotate(-360deg)}}
.p-core{
  position:absolute;inset:34px;border-radius:50%;
  background:radial-gradient(circle,var(--crimson-lt) 0%,var(--crimson) 40%,transparent 75%);
  animation:breathe 2s ease-in-out infinite;
}
@keyframes breathe{0%,100%{transform:scale(.85);opacity:.5}50%{transform:scale(1.1);opacity:1}}
.p-text{font-family:'Cinzel',serif;font-size:.65rem;letter-spacing:.5em;text-transform:uppercase;color:var(--ink-dim);animation:blink 1.8s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

/* Nav */
.nav-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 20px;background:var(--bg);border-bottom:1px solid var(--border);
  box-shadow:0 2px 20px rgba(0,0,0,.5);
}
.nav-back{
  background:var(--surface);border:1px solid var(--border);color:var(--gold);
  padding:8px 16px;font-family:'Cinzel',serif;font-size:.56rem;
  letter-spacing:.22em;text-transform:uppercase;cursor:pointer;
  text-decoration:none;display:flex;align-items:center;gap:7px;transition:all .3s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
.nav-back:hover{border-color:var(--gold);color:var(--gold-hot);transform:translateX(-3px)}
.nav-title{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--crimson-lt);text-shadow:0 0 10px var(--crimson-glow);
}
.nav-actions{display:flex;align-items:center;gap:10px}
#save-btn{
  background:var(--crimson);border:1px solid var(--crimson-lt);color:#fff;
  padding:8px 18px;font-family:'Cinzel',serif;font-size:.58rem;
  letter-spacing:.2em;text-transform:uppercase;cursor:pointer;transition:all .3s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  display:none;
}
#save-btn:hover{background:var(--crimson-lt);box-shadow:0 0 20px var(--crimson-glow)}
#save-btn.show{display:block}
#sync-status{font-family:'Cinzel',serif;font-size:.55rem;letter-spacing:.2em;color:var(--ink-dim);transition:color .3s}
#theme-btn{
  background:var(--surface);border:1px solid var(--border);color:var(--gold);
  width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:.9rem;
  display:flex;align-items:center;justify-content:center;transition:all .3s;
}
#theme-btn:hover{border-color:var(--gold);transform:scale(1.1) rotate(20deg)}

/* Page */
.page{
  position:relative;z-index:2;max-width:860px;margin:0 auto;
  padding:90px 24px 100px;
  opacity:0;transform:translateY(14px);transition:opacity .9s ease .3s,transform .9s ease .3s;
}
.page.visible{opacity:1;transform:translateY(0)}

/* Boss header */
.boss-header{
  display:grid;grid-template-columns:auto 1fr;gap:28px;align-items:start;
  margin-bottom:36px;padding-bottom:28px;border-bottom:1px solid var(--border);
}
.avatar-wrap{
  position:relative;width:160px;height:160px;flex-shrink:0;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
}
.avatar-img{
  width:100%;height:100%;object-fit:cover;background:var(--surface2);
  display:block;cursor:pointer;transition:filter .3s;border:1px solid var(--crimson);
}
.avatar-img:hover{filter:brightness(1.15)}
.avatar-placeholder{
  width:100%;height:100%;background:var(--surface2);border:1px dashed var(--crimson);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:8px;cursor:pointer;transition:all .3s;
}
.avatar-placeholder:hover{border-color:var(--crimson-lt);background:var(--surface)}
.avatar-placeholder span{font-size:2rem;opacity:.4;color:var(--crimson-lt)}
.avatar-placeholder p{font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-dim)}
.avatar-overlay{
  position:absolute;inset:0;background:rgba(122,24,40,.6);
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .3s;cursor:pointer;
  clip-path:polygon(0 0,calc(100% - 20px) 0,100% 20px,100% 100%,20px 100%,0 calc(100% - 20px));
}
.avatar-overlay:hover{opacity:1}
.avatar-overlay span{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:#fff}
#avatar-input{display:none}

.boss-meta{display:flex;flex-direction:column;gap:12px}
.boss-name-row{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap}
#boss-nome{
  font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,4vw,2.2rem);font-weight:900;
  background:linear-gradient(135deg,var(--crimson-lt),#e05060,var(--crimson-lt));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 16px var(--crimson-glow));letter-spacing:.06em;
  border:none;background-color:transparent;width:100%;cursor:text;
  font-family:'Cinzel Decorative',serif;
}
#boss-nome:focus{outline:none;filter:drop-shadow(0 0 22px rgba(184,48,64,.5))}
.type-cr-row{display:flex;gap:14px;align-items:center;flex-wrap:wrap}
.field-inline{
  display:flex;flex-direction:column;gap:4px;
}
.field-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.35em;text-transform:uppercase;color:var(--ink-dim)}
.field-input{
  background:var(--surface2);border:1px solid var(--border);color:var(--ink);
  padding:6px 10px;font-family:'IM Fell English',serif;font-size:.9rem;
  outline:none;transition:border-color .25s;min-width:120px;
}
.field-input:focus{border-color:var(--crimson)}
.field-input.narrow{min-width:70px;width:70px}

/* HP Block */
.hp-block{
  display:flex;align-items:center;gap:14px;flex-wrap:wrap;
  margin-top:8px;
}
.hp-current{
  font-family:'Cinzel Decorative',serif;font-size:2.2rem;font-weight:900;
  color:var(--crimson-lt);text-shadow:0 0 20px var(--crimson-glow);line-height:1;
  border:none;background:transparent;width:80px;text-align:center;
}
.hp-current:focus{outline:none}
.hp-sep{font-size:1.4rem;color:var(--ink-dim)}
.hp-max{
  font-family:'Cinzel',serif;font-size:1rem;color:var(--ink-dim);
  border:none;background:transparent;width:60px;text-align:center;
}
.hp-max:focus{outline:none;color:var(--ink)}
.hp-bar-wrap{flex:1;min-width:120px;height:8px;background:var(--surface2);border:1px solid var(--border);position:relative}
.hp-bar{height:100%;background:linear-gradient(90deg,var(--crimson),var(--crimson-lt));transition:width .4s ease,background .4s}
.hp-label{font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.35em;text-transform:uppercase;color:var(--ink-dim)}

/* Visibility toggles */
.vis-row{
  display:flex;gap:10px;margin-top:6px;flex-wrap:wrap;
}
.vis-tag{
  display:flex;align-items:center;gap:6px;padding:4px 10px;
  border:1px solid var(--border);background:var(--surface2);cursor:pointer;
  font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink-dim);transition:all .25s;
  clip-path:polygon(0 0,calc(100% - 6px) 0,100% 6px,100% 100%,6px 100%,0 calc(100% - 6px));
}
.vis-tag.on{border-color:var(--gold-dim);color:var(--gold);background:rgba(200,146,42,.08)}
.vis-tag.on .vis-dot{background:var(--gold)}
.vis-dot{width:6px;height:6px;border-radius:50%;background:var(--ink-dim);transition:background .25s}

/* Section */
.section{margin-bottom:32px}
.section-head{
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.4em;text-transform:uppercase;
  color:var(--crimson-lt);margin-bottom:14px;display:flex;align-items:center;gap:12px;
  padding-bottom:8px;border-bottom:1px solid var(--border);
}
.section-head::before{content:'✦';opacity:.6}

/* Stats grid */
.stats-grid{
  display:grid;grid-template-columns:repeat(6,1fr);gap:10px;
  padding:18px;background:var(--surface);border:1px solid var(--border);
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
}
.stat-cell{display:flex;flex-direction:column;align-items:center;gap:4px}
.stat-name{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-dim)}
.stat-val{
  font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold-lt);
  border:none;background:transparent;text-align:center;width:48px;
}
.stat-val:focus{outline:none;color:var(--gold-hot)}
.stat-mod{font-family:'Cinzel',serif;font-size:.7rem;color:var(--ink-dim)}

/* Sub-stats */
.sub-stats{
  display:flex;gap:20px;flex-wrap:wrap;margin-top:14px;
}
.sub-stat{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:10px 16px;background:var(--surface);border:1px solid var(--border);
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
  min-width:70px;
}
.sub-stat label{font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.25em;text-transform:uppercase;color:var(--ink-dim)}
.sub-stat input{
  font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold-lt);
  border:none;background:transparent;text-align:center;width:50px;
}
.sub-stat input:focus{outline:none;color:var(--gold-hot)}

/* Dynamic list (ações / habilidades) */
.dyn-list{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.dyn-item{
  background:var(--surface);border:1px solid var(--border);
  padding:14px 16px;position:relative;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
  transition:border-color .25s;
}
.dyn-item:hover{border-color:var(--crimson)}
.dyn-item-name{
  font-family:'Cinzel',serif;font-size:.8rem;letter-spacing:.12em;color:var(--crimson-lt);
  border:none;background:transparent;width:100%;margin-bottom:6px;
}
.dyn-item-name:focus{outline:none;color:var(--gold-hot)}
.dyn-item-desc{
  font-size:.9rem;color:var(--ink-2);font-style:italic;line-height:1.5;
  border:none;background:transparent;width:100%;resize:vertical;min-height:48px;
  font-family:'IM Fell English',serif;
}
.dyn-item-desc:focus{outline:none;color:var(--ink)}
.dyn-remove{
  position:absolute;top:10px;right:10px;background:none;border:none;
  color:var(--crimson-lt);opacity:.4;cursor:pointer;font-size:.9rem;transition:opacity .25s;
}
.dyn-remove:hover{opacity:1}
.add-btn{
  display:flex;align-items:center;gap:8px;padding:10px 16px;
  border:1.5px dashed var(--crimson);color:var(--crimson-lt);background:transparent;
  font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;
  cursor:pointer;transition:all .28s;width:100%;
  clip-path:polygon(0 0,calc(100% - 10px) 0,100% 10px,100% 100%,10px 100%,0 calc(100% - 10px));
}
.add-btn:hover{border-style:solid;background:var(--crimson-glow);color:#fff;box-shadow:0 0 18px var(--crimson-glow)}

/* Notas do Mestre */
.notes-area{
  width:100%;background:var(--surface);border:1px solid var(--border);color:var(--ink);
  padding:14px 16px;font-family:'IM Fell English',serif;font-size:.95rem;
  line-height:1.65;resize:vertical;min-height:120px;outline:none;transition:border-color .25s;
}
.notes-area:focus{border-color:var(--crimson)}
.notes-hint{font-size:.76rem;font-style:italic;color:var(--ink-dim);margin-top:6px}

/* Danger Zone */
.danger-zone{
  margin-top:48px;padding:18px 22px;
  border:1px solid var(--crimson);background:rgba(122,24,40,.06);
  clip-path:polygon(0 0,calc(100% - 12px) 0,100% 12px,100% 100%,12px 100%,0 calc(100% - 12px));
}
.danger-title{font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.35em;text-transform:uppercase;color:var(--crimson-lt);margin-bottom:10px}
.delete-btn{
  background:none;border:1px solid var(--crimson);color:var(--crimson-lt);
  padding:9px 20px;font-family:'Cinzel',serif;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  cursor:pointer;transition:all .3s;
  clip-path:polygon(0 0,calc(100% - 8px) 0,100% 8px,100% 100%,8px 100%,0 calc(100% - 8px));
}
.delete-btn:hover{background:var(--crimson);color:#fff;box-shadow:0 0 20px var(--crimson-glow)}

/* Loading / error */
.state-msg{
  font-family:'Cinzel',serif;letter-spacing:.3em;color:var(--ink-dim);
  text-align:center;padding:80px 0;animation:blink 1.6s ease-in-out infinite;
}
.state-msg.err{color:var(--crimson-lt);animation:none}

@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@media(max-width:600px){
  .boss-header{grid-template-columns:1fr;gap:16px}
  .avatar-wrap{width:120px;height:120px}
  .stats-grid{grid-template-columns:repeat(3,1fr)}
  .page{padding:80px 14px 80px}
}
</style>
</head>
<body>

<div id="portal-screen">
  <div class="p-ring">
    <svg class="p-outer" viewBox="0 0 110 110" fill="none">
      <polygon points="55,3 107,29 107,81 55,107 3,81 3,29"
        stroke="url(#bpg1)" stroke-width="1" fill="none" stroke-dasharray="5 4"/>
      <defs>
        <linearGradient id="bpg1" x1="0" y1="0" x2="110" y2="110" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#7a1828"/>
          <stop offset="50%" stop-color="#b83040"/>
          <stop offset="100%" stop-color="#7a1828"/>
        </linearGradient>
      </defs>
    </svg>
    <svg class="p-inner" viewBox="0 0 78 78" fill="none" style="position:absolute;inset:16px;width:78px;height:78px;">
      <polygon points="39,3 75,21 75,57 39,75 3,57 3,21"
        stroke="url(#bpg2)" stroke-width=".8" fill="none"/>
      <defs>
        <linearGradient id="bpg2" x1="0" y1="0" x2="78" y2="78" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#b83040"/>
          <stop offset="100%" stop-color="#3a0810"/>
        </linearGradient>
      </defs>
    </svg>
    <div class="p-core"></div>
  </div>
  <div class="p-text">⧖ Convocando a Criatura ⧖</div>
</div>

<canvas id="cosmos"></canvas>

<nav class="nav-bar">
  <a class="nav-back" href="mestre.html">← Mestre</a>
  <span class="nav-title">⚔ Ficha de Criatura</span>
  <div class="nav-actions">
    <span id="sync-status"></span>
    <button id="save-btn">Salvar</button>
    <button id="theme-btn" title="Alternar tema">☽</button>
  </div>
</nav>

<div class="page" id="page">
  <div class="state-msg" id="loading-msg">⧖ Convocando a criatura…</div>
</div>

<script>
// ── Partículas ────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('cosmos'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  function cols(){
    return document.documentElement.getAttribute('data-theme')==='light'
      ?['rgba(106,15,30,','rgba(154,24,48,','rgba(80,10,20,']
      :['rgba(122,24,40,','rgba(184,48,64,','rgba(60,10,20,'];
  }
  for(let i=0;i<40;i++)ps.push({
    x:Math.random()*1400,y:Math.random()*900,
    r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
    a:Math.random()*.3+.06,p:Math.random()*Math.PI*2,
    ps:Math.random()*.015+.005,ci:Math.floor(Math.random()*3)
  });
  function draw(){
    ctx.clearRect(0,0,W,H);
    const cl=cols();
    ps.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.p+=p.ps;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      const a=p.a*(0.55+0.45*Math.sin(p.p));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=cl[p.ci]+a+')';ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Theme ─────────────────────────────────────────────────────────────────────
(function(){
  const btn=document.getElementById('theme-btn'),html=document.documentElement;
  const saved=localStorage.getItem('dnd-theme')||'dark';
  html.setAttribute('data-theme',saved);btn.textContent=saved==='dark'?'☀':'☽';
  btn.addEventListener('click',()=>{
    const n=html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',n);btn.textContent=n==='dark'?'☀':'☽';
    localStorage.setItem('dnd-theme',n);
  });
})();

// ── Portal ────────────────────────────────────────────────────────────────────
function hidePortal(){
  const p=document.getElementById('portal-screen');
  if(p)p.classList.add('fade-out');
}

// ── Utilitários ───────────────────────────────────────────────────────────────
const params=new URLSearchParams(location.search);
const BOSS_ID=params.get('id');
const IS_NEW=params.get('novo')==='1';

function mod(val){const m=Math.floor((Number(val||10)-10)/2);return(m>=0?'+':'')+m}

function setSyncStatus(txt,color){
  const el=document.getElementById('sync-status');
  if(el){el.textContent=txt;el.style.color=color||''}
}

// ── Estado ────────────────────────────────────────────────────────────────────
let boss={
  id:'',nome:'Nova Criatura',tipo:'',cr:'',
  hpMax:10,hpAtual:10,ca:10,
  atributos:{forca:10,destreza:10,constituicao:10,inteligencia:10,sabedoria:10,carisma:10},
  acoes:[],habilidades:[],notasMestre:'',
  visibilidade:{imagem:false,nome:false,hp:false}
};
let dirty=false;

// ── Renderizar boss ───────────────────────────────────────────────────────────
function renderBoss(){
  const page=document.getElementById('page');
  page.innerHTML=buildHTML();
  bindEvents();
  updateHpBar();
  requestAnimationFrame(()=>page.classList.add('visible'));
  hidePortal();
  setTimeout(()=>{
    document.getElementById('save-btn').classList.add('show');
  },300);
}

function buildHTML(){
  const b=boss;
  const attrs=[
    {key:'forca',label:'FOR'},{key:'destreza',label:'DES'},
    {key:'constituicao',label:'CON'},{key:'inteligencia',label:'INT'},
    {key:'sabedoria',label:'SAB'},{key:'carisma',label:'CAR'}
  ];

  const visTags=[
    {key:'imagem',label:'🖼 Imagem'},
    {key:'nome',label:'👁 Nome'},
    {key:'hp',label:'❤ HP'},
  ];

  return `
  <div class="boss-header">
    <div class="avatar-wrap" id="avatar-wrap">
      <div class="avatar-placeholder" id="avatar-placeholder">
        <span>☠</span>
        <p>Adicionar Imagem</p>
      </div>
      <img id="avatar-img" class="avatar-img" style="display:none" alt="Avatar">
      <div class="avatar-overlay" id="avatar-overlay"><span>Trocar</span></div>
      <input type="file" id="avatar-input" accept="image/*">
    </div>

    <div class="boss-meta">
      <div class="boss-name-row">
        <input id="boss-nome" type="text" value="${escHtml(b.nome)}" placeholder="Nome da Criatura"
          style="font-family:'Cinzel Decorative',serif;font-size:clamp(1.4rem,4vw,2rem);font-weight:900;
          background:transparent;border:none;color:var(--crimson-lt);width:100%;
          text-shadow:0 0 16px var(--crimson-glow);" autocomplete="off">
      </div>

      <div class="type-cr-row">
        <div class="field-inline">
          <span class="field-label">Tipo</span>
          <input class="field-input" id="boss-tipo" type="text" value="${escHtml(b.tipo)}" placeholder="ex: Morto-Vivo">
        </div>
        <div class="field-inline">
          <span class="field-label">CR</span>
          <input class="field-input narrow" id="boss-cr" type="text" value="${escHtml(String(b.cr))}" placeholder="CR">
        </div>
        <div class="field-inline">
          <span class="field-label">CA</span>
          <input class="field-input narrow" id="boss-ca" type="number" value="${b.ca}" min="0">
        </div>
      </div>

      <div class="hp-block">
        <span class="hp-label">HP</span>
        <input class="hp-current" id="hp-atual" type="number" value="${b.hpAtual}" min="0">
        <span class="hp-sep">/</span>
        <input class="hp-max" id="hp-max" type="number" value="${b.hpMax}" min="1">
        <div class="hp-bar-wrap"><div class="hp-bar" id="hp-bar"></div></div>
      </div>

      <div>
        <div class="field-label" style="margin-bottom:6px">Visível para jogadores</div>
        <div class="vis-row">
          ${visTags.map(t=>`
            <button class="vis-tag${b.visibilidade[t.key]?' on':''}" data-vis="${t.key}">
              <span class="vis-dot"></span>${t.label}
            </button>`).join('')}
        </div>
      </div>
    </div>
  </div>

  <!-- Atributos -->
  <div class="section">
    <div class="section-head">Atributos</div>
    <div class="stats-grid">
      ${attrs.map(a=>`
        <div class="stat-cell">
          <span class="stat-name">${a.label}</span>
          <input class="stat-val" data-attr="${a.key}" type="number" value="${b.atributos[a.key]||10}" min="1" max="30">
          <span class="stat-mod" id="mod-${a.key}">${mod(b.atributos[a.key])}</span>
        </div>`).join('')}
    </div>
    <div class="sub-stats">
      <!-- CA já está em cima; podemos repetir como reminder ou removê-lo -->
    </div>
  </div>

  <!-- Ações -->
  <div class="section">
    <div class="section-head">Ações</div>
    <div class="dyn-list" id="list-acoes">
      ${(b.acoes||[]).map((a,i)=>dynItemHTML('acoes',i,a)).join('')}
    </div>
    <button class="add-btn" id="add-acao">+ Adicionar Ação</button>
  </div>

  <!-- Habilidades -->
  <div class="section">
    <div class="section-head">Habilidades Especiais</div>
    <div class="dyn-list" id="list-habilidades">
      ${(b.habilidades||[]).map((h,i)=>dynItemHTML('habilidades',i,h)).join('')}
    </div>
    <button class="add-btn" id="add-habilidade">+ Adicionar Habilidade</button>
  </div>

  <!-- Notas do Mestre -->
  <div class="section">
    <div class="section-head">Notas do Mestre</div>
    <textarea class="notes-area" id="boss-notas" placeholder="Táticas, motivações, segredos…">${escHtml(b.notasMestre||'')}</textarea>
    <p class="notes-hint">⚠ Visível apenas para o Mestre.</p>
  </div>

  <!-- Danger Zone -->
  <div class="danger-zone">
    <div class="danger-title">⚠ Zona de Perigo</div>
    <button class="delete-btn" id="delete-btn">☠ Deletar Criatura</button>
  </div>
  `;
}

function dynItemHTML(tipo,idx,item){
  return `<div class="dyn-item" data-tipo="${tipo}" data-idx="${idx}">
    <input class="dyn-item-name" type="text" placeholder="Nome" value="${escHtml(item.nome||'')}">
    <textarea class="dyn-item-desc" placeholder="Descrição / dano / efeito…">${escHtml(item.desc||'')}</textarea>
    <button class="dyn-remove" title="Remover">✕</button>
  </div>`;
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── Bind events ───────────────────────────────────────────────────────────────
function bindEvents(){
  // Campos simples
  field('boss-nome',   v=>boss.nome=v);
  field('boss-tipo',   v=>boss.tipo=v);
  field('boss-cr',     v=>boss.cr=v);
  field('boss-ca',     v=>boss.ca=Number(v)||10);
  field('hp-atual',    v=>{boss.hpAtual=Number(v)||0;updateHpBar()});
  field('hp-max',      v=>{boss.hpMax=Number(v)||1;updateHpBar()});
  field('boss-notas',  v=>boss.notasMestre=v,'input');

  // Atributos
  document.querySelectorAll('.stat-val').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const key=inp.dataset.attr;
      boss.atributos[key]=Number(inp.value)||10;
      const m=document.getElementById('mod-'+key);
      if(m)m.textContent=mod(inp.value);
      markDirty();
    });
  });

  // Visibilidade
  document.querySelectorAll('.vis-tag').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const k=btn.dataset.vis;
      boss.visibilidade[k]=!boss.visibilidade[k];
      btn.classList.toggle('on',boss.visibilidade[k]);
      btn.querySelector('.vis-dot').style.background=boss.visibilidade[k]?'var(--gold)':'var(--ink-dim)';
      markDirty();
    });
  });

  // Listas dinâmicas (ações e habilidades)
  bindDynList('acoes','list-acoes','add-acao');
  bindDynList('habilidades','list-habilidades','add-habilidade');

  // Avatar
  const avatarPlaceholder=document.getElementById('avatar-placeholder');
  const avatarOverlay=document.getElementById('avatar-overlay');
  const avatarInput=document.getElementById('avatar-input');
  if(avatarPlaceholder) avatarPlaceholder.addEventListener('click',()=>avatarInput.click());
  if(avatarOverlay) avatarOverlay.addEventListener('click',()=>avatarInput.click());
  if(avatarInput) avatarInput.addEventListener('change',handleAvatarChange);

  // Salvar
  document.getElementById('save-btn').addEventListener('click',saveBoss);

  // Deletar
  document.getElementById('delete-btn').addEventListener('click',deleteBoss);
}

function field(id,setter,evt='change'){
  const el=document.getElementById(id);
  if(!el)return;
  el.addEventListener(evt,()=>{setter(el.value);markDirty()});
}

function bindDynList(tipo,listId,addId){
  const list=document.getElementById(listId);
  const addBtn=document.getElementById(addId);

  function readItems(){
    return Array.from(list.querySelectorAll('.dyn-item')).map(el=>({
      nome:el.querySelector('.dyn-item-name').value,
      desc:el.querySelector('.dyn-item-desc').value
    }));
  }

  list.addEventListener('input',()=>{boss[tipo]=readItems();markDirty()});
  list.addEventListener('click',e=>{
    const rm=e.target.closest('.dyn-remove');
    if(!rm)return;
    rm.closest('.dyn-item').remove();
    boss[tipo]=readItems();
    markDirty();
  });

  addBtn.addEventListener('click',()=>{
    const idx=list.children.length;
    boss[tipo].push({nome:'',desc:''});
    const div=document.createElement('div');
    div.innerHTML=dynItemHTML(tipo,idx,{nome:'',desc:''});
    list.appendChild(div.firstElementChild);
    list.lastElementChild.querySelector('.dyn-item-name').focus();
    markDirty();
  });
}

// ── HP Bar ────────────────────────────────────────────────────────────────────
function updateHpBar(){
  const bar=document.getElementById('hp-bar');
  if(!bar)return;
  const pct=Math.max(0,Math.min(100,(boss.hpAtual/Math.max(1,boss.hpMax))*100));
  bar.style.width=pct+'%';
  bar.style.background=pct>60
    ?'linear-gradient(90deg,var(--crimson),var(--crimson-lt))'
    :pct>25
    ?'linear-gradient(90deg,#a04010,#d06020)'
    :'linear-gradient(90deg,#600000,#900010)';
}

// ── Avatar ────────────────────────────────────────────────────────────────────
function handleAvatarChange(e){
  const file=e.target.files[0];
  if(!file)return;
  if(file.size>800*1024){alert('Imagem muito grande. Máximo: 800KB.');return}
  const reader=new FileReader();
  reader.onload=async ev=>{
    const data=ev.target.result;
    showAvatar(data);
    try{
      await fetch(`/api/boss-avatar?id=${BOSS_ID}`,{
        method:'POST',headers:{'Content-Type':'application/json'},
        body:JSON.stringify({avatar:data})
      });
      setSyncStatus('✦ Imagem salva',getComputedStyle(document.documentElement).getPropertyValue('--gold'));
      setTimeout(()=>setSyncStatus(''),2000);
    }catch{setSyncStatus('⚠ Erro ao salvar imagem','var(--crimson-lt)');}
  };
  reader.readAsDataURL(file);
}

function showAvatar(src){
  const img=document.getElementById('avatar-img');
  const ph=document.getElementById('avatar-placeholder');
  if(img&&ph){img.src=src;img.style.display='block';ph.style.display='none'}
}

async function loadAvatar(){
  try{
    const r=await fetch(`/api/boss-avatar?id=${BOSS_ID}`);
    if(r.ok){const d=await r.json();if(d.avatar)showAvatar(d.avatar);}
  }catch{}
}

// ── Dirty ─────────────────────────────────────────────────────────────────────
function markDirty(){
  dirty=true;
  setSyncStatus('● Não salvo','var(--gold-dim)');
}

// ── Salvar ────────────────────────────────────────────────────────────────────
async function saveBoss(){
  const btn=document.getElementById('save-btn');
  btn.textContent='⧖ Salvando…';btn.disabled=true;
  try{
    const r=await fetch(`/api/boss?id=${boss.id}`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify(boss)
    });
    if(!r.ok)throw new Error(await r.text());
    dirty=false;
    setSyncStatus('✦ Salvo','var(--gold)');
    setTimeout(()=>setSyncStatus(''),2000);
  }catch(err){
    setSyncStatus('⚠ Erro ao salvar','var(--crimson-lt)');
    alert('Erro ao salvar: '+err.message);
  }finally{
    btn.textContent='Salvar';btn.disabled=false;
  }
}

// ── Deletar ───────────────────────────────────────────────────────────────────
async function deleteBoss(){
  if(!confirm(`Deletar "${boss.nome}" permanentemente?`))return;
  try{
    await fetch(`/api/boss?id=${BOSS_ID}`,{method:'DELETE'});
    location.href='mestre.html';
  }catch{alert('Erro ao deletar.')}
}

// ── Carregar ──────────────────────────────────────────────────────────────────
async function init(){
  if(!BOSS_ID){
    document.getElementById('page').innerHTML='<div class="state-msg err">⚠ ID de boss não fornecido.</div>';
    hidePortal();return;
  }

  if(IS_NEW){
    // Criação nova: usa defaults com id já definido
    boss.id=BOSS_ID;
    boss.nome=params.get('nome')||'Nova Criatura';
    renderBoss();
    return;
  }

  try{
    const r=await fetch(`/api/boss?id=${BOSS_ID}`);
    if(!r.ok){
      document.getElementById('page').innerHTML='<div class="state-msg err">⚠ Criatura não encontrada.</div>';
      hidePortal();return;
    }
    const data=await r.json();
    boss={...boss,...data};
    boss.id=BOSS_ID;
    boss.visibilidade=data.visibilidade||{imagem:false,nome:false,hp:false};
    renderBoss();
    loadAvatar();
  }catch(err){
    document.getElementById('page').innerHTML=`<div class="state-msg err">⚠ Erro: ${err.message}</div>`;
    hidePortal();
  }
}

window.addEventListener('beforeunload',e=>{
  if(dirty){e.preventDefault();e.returnValue=''}
});

init();
</script>
</body>
</html>
