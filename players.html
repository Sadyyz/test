<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo RPG — D&D Bankai</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0a0809;--bg2:#100d12;--surface:#161219;--surface2:#1e1825;
  --border:#2c2238;--ink:#ede0c8;--ink-2:#b8a890;--ink-dim:#6a5a48;
  --gold:#c8922a;--gold-lt:#e8be68;--gold-hot:#f2d078;--gold-dim:#5a3e10;
  --crimson:#7a1828;--crimson-lt:#b83040;--crimson-glow:rgba(122,24,40,.25);
  --glow-g:rgba(200,146,42,.2);--card-s:0 2px 20px rgba(0,0,0,.75);
  --rune-op:.018;--pulse-color:rgba(200,146,42,.12);
  --bs-panel:rgba(10,6,8,.92);--bs-border:rgba(180,30,50,.55);
  --bs-ornament:rgba(150,20,40,.8);
}
[data-theme="light"]{
  --bg:#f4ede0;--bg2:#ece4d4;--surface:#fdf8f0;--surface2:#f5eddc;
  --border:#c8a870;--ink:#18100a;--ink-2:#5a4030;--ink-dim:#8a6a50;
  --gold:#8a5a10;--gold-lt:#aa7830;--gold-hot:#7a4808;--gold-dim:#e8d4b0;
  --crimson:#6a0f1e;--crimson-lt:#9a1830;--crimson-glow:rgba(106,15,30,.12);
  --glow-g:rgba(138,90,16,.1);--card-s:0 2px 20px rgba(60,30,0,.08);
  --rune-op:.035;--pulse-color:rgba(138,90,16,.08);
  --bs-panel:rgba(240,225,200,.95);--bs-border:rgba(140,30,50,.45);
  --bs-ornament:rgba(120,20,40,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);font-family:'IM Fell English',Georgia,serif;
  min-height:100vh;overflow-x:hidden;transition:background .5s,color .5s;
}
body::before{
  content:"ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ";
  position:fixed;inset:0;font-size:1.4rem;letter-spacing:.6em;line-height:4em;
  color:var(--gold);opacity:var(--rune-op);word-break:break-all;pointer-events:none;z-index:0;padding:32px;
  animation:runeShift 70s linear infinite;
}
@keyframes runeShift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4%)}}
#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Top bar */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:rgba(10,8,9,.9);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.top-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);text-shadow:0 0 12px var(--glow-g)}
.top-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;background:rgba(200,146,42,.06)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse-dot 1.6s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.live-badge.offline{border-color:var(--ink-dim);color:var(--ink-dim)}
.live-badge.offline .live-dot{background:var(--ink-dim);animation:none}
.live-badge.combat{border-color:var(--crimson);color:var(--crimson-lt)}
.live-badge.combat .live-dot{background:var(--crimson-lt)}
#theme-btn{background:var(--surface);border:1px solid var(--border);color:var(--gold);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .3s}
#theme-btn:hover{border-color:var(--gold);transform:scale(1.1) rotate(20deg)}

/* Standby (fora de combate) */
.page-standby{position:relative;z-index:2;max-width:1060px;margin:0 auto;padding:78px 20px 80px}
#standby{text-align:center;padding:80px 0 20px}
.standby-ring{width:90px;height:90px;border:1px dashed var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.8rem;opacity:.3;animation:slowSpin 20s linear infinite}
@keyframes slowSpin{to{transform:rotate(360deg)}}
.standby-text{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;color:var(--ink-dim)}

/* ══════════════════════════════════════════════════════
   BLACK SOULS 2 — ARENA LAYOUT
   ══════════════════════════════════════════════════════ */
#bs-arena{
  display:none;position:fixed;inset:0;z-index:10;
  background:var(--bg);overflow:hidden;
}
#bs-arena.show{display:flex;flex-direction:column}

/* ── Boss Area (imagem) */
#bs-boss-area{
  flex:1;position:relative;overflow:hidden;min-height:0;
  display:flex;align-items:center;justify-content:center;
}
#bs-boss-img{
  max-height:85%;max-width:70%;width:auto;height:auto;
  object-fit:contain;object-position:center;
  display:block;filter:brightness(.9) contrast(1.05) drop-shadow(0 0 32px rgba(120,0,0,.5));
}
#bs-boss-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:8rem;opacity:.08;color:var(--crimson-lt);
}

/* Boss HP bar (flutuante sobre a imagem, no centro) */
#bs-boss-hpbar-wrap{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  width:min(420px,80%);z-index:5;
}
.bs-boss-hp-label{
  font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.5em;text-transform:uppercase;
  color:var(--crimson-lt);text-align:center;margin-bottom:4px;text-shadow:0 0 8px #000;
}
.bs-hp-track{
  height:8px;background:rgba(0,0,0,.7);border:1px solid var(--crimson);
  position:relative;overflow:hidden;
}
.bs-hp-fill{
  height:100%;background:linear-gradient(90deg,#6a0010,#c03040);
  transition:width .6s ease;box-shadow:0 0 8px rgba(180,30,50,.6);
}

/* Rodada badge flutuante */
#bs-round-badge{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.4em;text-transform:uppercase;
  color:var(--gold);padding:6px 18px;
  background:rgba(10,6,8,.7);border:1px solid var(--gold-dim);
  text-shadow:0 0 10px var(--glow-g);z-index:5;
}

/* ── Left Panel: Menu de Ações (decorativo) */
#bs-action-menu{
  position:absolute;left:16px;bottom:80px;z-index:6;
  width:140px;
}
.bs-action-panel{
  background:rgba(8,4,6,.85);
  border:1px solid var(--bs-border);
  border-left:3px solid var(--crimson-lt);
  padding:4px 0;
  backdrop-filter:blur(4px);
}
/* Ornamental corner stitching */
.bs-action-panel::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--crimson-lt),transparent);
}
.bs-action-panel::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,var(--crimson-lt),transparent);
}
.bs-action-item{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;
  color:var(--ink-2);cursor:default;position:relative;
  transition:color .2s;border-bottom:1px solid rgba(44,34,56,.5);
}
.bs-action-item:last-child{border-bottom:none}
.bs-action-item.bs-selected{
  color:var(--gold-hot);background:rgba(200,146,42,.08);
}
.bs-action-item.bs-selected::before{
  content:'▶';position:absolute;left:4px;font-size:.5rem;color:var(--gold);
}
.bs-action-item.bs-enemy-action{color:var(--crimson-lt)}
.bs-action-icon{font-size:.8rem;opacity:.7;min-width:16px;text-align:center}

/* ── Right Panel: Histórico de Combate */
#bs-log-panel{
  position:absolute;right:16px;top:50px;bottom:80px;z-index:6;
  width:220px;display:flex;flex-direction:column;
}
.bs-log-header{
  font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold-dim);padding:6px 10px 4px;
  background:rgba(8,4,6,.85);border:1px solid var(--bs-border);border-bottom:none;
  display:flex;align-items:center;gap:6px;
}
.bs-log-header-dot{width:5px;height:5px;border-radius:50%;background:var(--crimson-lt);animation:pulse-dot 1.6s ease-in-out infinite}
#bs-log-scroll{
  flex:1;overflow-y:auto;
  background:rgba(8,4,6,.82);border:1px solid var(--bs-border);border-top:none;
  padding:6px 0;
  scrollbar-width:thin;scrollbar-color:var(--crimson) transparent;
}
#bs-log-scroll::-webkit-scrollbar{width:3px}
#bs-log-scroll::-webkit-scrollbar-track{background:transparent}
#bs-log-scroll::-webkit-scrollbar-thumb{background:var(--crimson)}
.bs-log-entry{
  padding:4px 10px;font-family:'IM Fell English',serif;font-size:.68rem;
  color:var(--ink-2);line-height:1.4;border-bottom:1px solid rgba(44,34,56,.3);
}
.bs-log-entry:last-child{border-bottom:none}
.bs-log-entry .log-time{color:var(--ink-dim);font-size:.56rem;display:block;margin-bottom:1px}
.bs-log-entry.log-attack .log-icon{color:var(--crimson-lt)}
.bs-log-entry.log-skill .log-icon{color:#6090d0}
.bs-log-entry.log-item .log-icon{color:#50a060}
.bs-log-entry.log-system .log-icon{color:var(--gold-dim)}
.bs-log-entry.log-manual .log-icon{color:var(--gold-lt)}

/* Entrada manual */
.bs-log-input-row{
  display:flex;gap:4px;padding:4px;
  background:rgba(8,4,6,.85);border:1px solid var(--bs-border);border-top:none;
}
#bs-log-input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--ink);font-family:'IM Fell English',serif;font-size:.7rem;padding:4px 7px;
  outline:none;
}
#bs-log-input:focus{border-color:var(--gold-dim)}
#bs-log-send{
  background:var(--crimson);border:none;color:var(--ink);font-size:.7rem;
  padding:4px 8px;cursor:pointer;transition:background .2s;
}
#bs-log-send:hover{background:var(--crimson-lt)}

/* ── Bottom Panel: Players */
#bs-players-bottom{
  flex-shrink:0;
  background:var(--bs-panel);
  border-top:2px solid var(--bs-border);
  position:relative;z-index:8;
}

/* Ornamental top border */
#bs-players-bottom::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--crimson-lt) 20%,var(--crimson-lt) 80%,transparent);
  opacity:.5;
}

/* Padrão de ornamento tipo spades do Black Souls 2 */
.bs-ornament-strip{
  height:6px;
  background:repeating-linear-gradient(90deg,
    var(--crimson) 0,var(--crimson) 3px,
    transparent 3px,transparent 8px,
    var(--gold-dim) 8px,var(--gold-dim) 9px,
    transparent 9px,transparent 14px
  );
  opacity:.4;
}

.bs-players-row{
  display:flex;align-items:stretch;overflow-x:auto;
  padding:0;gap:0;
  scrollbar-width:none;
}
.bs-players-row::-webkit-scrollbar{display:none}

/* Card de cada player */
.bs-player-card{
  display:flex;align-items:center;gap:0;
  flex-shrink:0;min-width:220px;max-width:300px;flex:1;
  border-right:1px solid rgba(44,34,56,.8);
  position:relative;transition:background .3s;
}
.bs-player-card:last-child{border-right:none}
.bs-player-card.is-turn{background:rgba(200,146,42,.06)}
.bs-player-card.is-turn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}

/* Avatar */
.bs-player-avatar{
  width:52px;height:56px;flex-shrink:0;overflow:hidden;position:relative;
}
.bs-player-avatar img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.bs-player-avatar-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);font-size:1.4rem;color:var(--gold);opacity:.4;
}

/* Turno número (badge no avatar) */
.bs-player-turn-badge{
  position:absolute;top:2px;right:2px;background:var(--gold);color:var(--bg);
  font-family:'Cinzel',serif;font-size:.42rem;padding:1px 4px;letter-spacing:.08em;
}

/* Info do player */
.bs-player-info{
  flex:1;padding:6px 10px;display:flex;flex-direction:column;gap:3px;min-width:0;
}
.bs-player-name{
  font-family:'Cinzel',serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;
  color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.bs-player-card.is-turn .bs-player-name{color:var(--gold-hot)}

/* Barra de HP */
.bs-stat-row{display:flex;align-items:center;gap:5px}
.bs-stat-label{
  font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;
  color:var(--ink-dim);min-width:18px;
}
.bs-stat-val{
  font-family:'Cinzel',serif;font-size:.68rem;color:var(--ink-2);
  white-space:nowrap;min-width:60px;
}
.bs-stat-bar-wrap{flex:1;height:5px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);min-width:40px}
.bs-stat-bar{height:100%;transition:width .4s ease,background .4s}

/* HP coloring */
.hp-high{background:linear-gradient(90deg,#1a6a20,#28a830)}
.hp-mid{background:linear-gradient(90deg,#904010,#d05820)}
.hp-low{background:linear-gradient(90deg,#500000,#800010)}

/* Energia coloring */
.energy-bar{background:linear-gradient(90deg,#1a408a,#2860c0)}

/* Separador entre players */
.bs-player-sep{
  width:1px;background:linear-gradient(180deg,transparent,var(--bs-border),transparent);
  align-self:stretch;flex-shrink:0;
}

/* Estados fora de combate */
#standby-bs{
  text-align:center;padding:80px 0;
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;
  color:var(--ink-dim);
}
.standby-ring-bs{
  width:90px;height:90px;border:1px dashed var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
  font-size:1.8rem;opacity:.3;animation:slowSpin 20s linear infinite;
}

/* Scrollbar log mobile */
@media(max-width:700px){
  #bs-log-panel{width:160px;right:8px}
  #bs-action-menu{width:110px;left:8px}
  .bs-player-card{min-width:180px}
}
@media(max-width:480px){
  #bs-log-panel{display:none}
  #bs-action-menu{display:none}
}
</style>
</head>
<body>

<canvas id="cosmos"></canvas>

<header class="top-bar">
  <div class="top-title">⚔ Modo RPG</div>
  <div class="top-right">
    <div class="live-badge offline" id="live-badge">
      <span class="live-dot"></span>
      <span id="live-text">Aguardando…</span>
    </div>
    <button id="theme-btn" title="Alternar tema">☽</button>
  </div>
</header>

<!-- ══ ARENA: Black Souls 2 Layout (aparece em combate) ══ -->
<div id="bs-arena">

  <!-- Área do Boss (imagem grande) -->
  <div id="bs-boss-area">
    <div id="bs-boss-placeholder">☠</div>
    <img id="bs-boss-img" src="" alt="" style="display:none">

    <!-- Rodada -->
    <div id="bs-round-badge">Rodada <span id="bs-round-num">1</span></div>

    <!-- HP bar do boss centralizada na parte de baixo da imagem -->
    <div id="bs-boss-hpbar-wrap" style="display:none">
      <div class="bs-boss-hp-label" id="bs-boss-hp-name">BOSS</div>
      <div class="bs-hp-track">
        <div class="bs-hp-fill" id="bs-boss-hp-fill" style="width:100%"></div>
      </div>
    </div>

    <!-- Painel esquerdo: Menu de Ações (decorativo) -->
    <div id="bs-action-menu">
      <div class="bs-action-panel">
        <div class="bs-action-item bs-selected">
          <span class="bs-action-icon">⚔</span> Atacar
        </div>
        <div class="bs-action-item">
          <span class="bs-action-icon">✦</span> Habilidade
        </div>
        <div class="bs-action-item">
          <span class="bs-action-icon">🛡</span> Defender
        </div>
        <div class="bs-action-item">
          <span class="bs-action-icon">🎒</span> Item
        </div>
        <div class="bs-action-item bs-enemy-action">
          <span class="bs-action-icon">💨</span> Fugir
        </div>
      </div>
    </div>

    <!-- Painel direito: Histórico de Combate -->
    <div id="bs-log-panel">
      <div class="bs-log-header">
        <span class="bs-log-header-dot"></span>
        Histórico
      </div>
      <div id="bs-log-scroll">
        <div class="bs-log-entry log-system">
          <span class="log-icon">⚙</span>
          <span class="log-time" id="log-init-time"></span>
          Combate iniciado
        </div>
      </div>
      <div class="bs-log-input-row">
        <input id="bs-log-input" type="text" placeholder="Narrar ação…" maxlength="120">
        <button id="bs-log-send">▶</button>
      </div>
    </div>
  </div>

  <!-- Tira ornamental -->
  <div class="bs-ornament-strip"></div>

  <!-- Barra inferior: Players -->
  <div id="bs-players-bottom">
    <div class="bs-players-row" id="bs-players-row">
      <!-- preenchido via JS -->
    </div>
  </div>

</div>

<!-- Tela de standby (fora de combate) -->
<div class="page-standby">
  <div id="standby">
    <div class="standby-ring">⧖</div>
    <p class="standby-text">Aguardando o Mestre iniciar o combate</p>
  </div>
</div>

<script>
// ── Partículas ────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('cosmos'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  function cols(){
    return document.documentElement.getAttribute('data-theme')==='light'
      ?['rgba(138,90,16,','rgba(168,120,48,','rgba(100,70,20,']
      :['rgba(200,146,42,','rgba(242,208,120,','rgba(90,62,16,'];
  }
  for(let i=0;i<44;i++)ps.push({
    x:Math.random()*1400,y:Math.random()*900,
    r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
    a:Math.random()*.3+.07,p:Math.random()*Math.PI*2,
    ps:Math.random()*.015+.005,ci:Math.floor(Math.random()*3)
  });
  function draw(){
    ctx.clearRect(0,0,W,H);const cl=cols();
    ps.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.p+=p.ps;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      const a=p.a*(0.55+0.45*Math.sin(p.p));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=cl[p.ci]+a+')';ctx.fill();
    });
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
      const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);
      ctx.strokeStyle=cl[0]+(0.05*(1-d/80))+')';ctx.lineWidth=.4;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Theme ─────────────────────────────────────────────────────────────────────
(function(){
  const btn=document.getElementById('theme-btn'),html=document.documentElement;
  const saved=localStorage.getItem('dnd-theme')||'dark';
  html.setAttribute('data-theme',saved);btn.textContent=saved==='dark'?'☀':'☽';
  btn.addEventListener('click',()=>{
    const n=html.getAttribute('data-theme')==='dark'?'light':'dark';
    html.setAttribute('data-theme',n);btn.textContent=n==='dark'?'☀':'☽';
    localStorage.setItem('dnd-theme',n);
  });
})();

// ── Estado ────────────────────────────────────────────────────────────────────
let lastCombatHash='';
let lastPlayersHash='';
let combatAtivo=false;
let fichas=[];
let currentTurno=null;
let combatLog=[];

// ── Live Badge ────────────────────────────────────────────────────────────────
function setBadge(mode){
  const badge=document.getElementById('live-badge');
  const text=document.getElementById('live-text');
  badge.className='live-badge';
  if(mode==='live'){badge.classList.add('live');text.textContent='Ao Vivo'}
  else if(mode==='combat'){badge.classList.add('combat');text.textContent='⚔ Em Combate'}
  else if(mode==='offline'){badge.classList.add('offline');text.textContent='Offline'}
  else{badge.classList.add('offline');text.textContent='Aguardando…'}
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hpColor(pct){return pct>60?'hp-high':pct>25?'hp-mid':'hp-low'}
function hpPct(atual,max){return Math.max(0,Math.min(100,((Number(atual)||0)/(Math.max(1,Number(max)||1)))*100))}

function nowTime(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

// ── Log de Combate ────────────────────────────────────────────────────────────
function addLog(text,type='system'){
  combatLog.push({text,type,time:nowTime()});
  if(combatLog.length>60)combatLog.shift();
  renderLog();
}

function renderLog(){
  const scroll=document.getElementById('bs-log-scroll');
  const icons={attack:'⚔',skill:'✦',item:'🎒',system:'⚙',manual:'📜'};
  scroll.innerHTML=combatLog.map(e=>`
    <div class="bs-log-entry log-${e.type}">
      <span class="log-icon">${icons[e.type]||'•'}</span>
      <span class="log-time">${e.time}</span>
      ${esc(e.text)}
    </div>
  `).join('');
  scroll.scrollTop=scroll.scrollHeight;
}

// Entrada manual
document.getElementById('bs-log-input').addEventListener('keydown',e=>{
  if(e.key==='Enter')sendLog();
});
document.getElementById('bs-log-send').addEventListener('click',sendLog);
function sendLog(){
  const inp=document.getElementById('bs-log-input');
  const v=inp.value.trim();
  if(!v)return;
  addLog(v,'manual');
  inp.value='';
}

// Timestamp na entrada inicial
document.getElementById('log-init-time').textContent=nowTime();

// ── Render: Boss (arena) ──────────────────────────────────────────────────────
async function renderBossArena(bossEntry){
  const img=document.getElementById('bs-boss-img');
  const ph=document.getElementById('bs-boss-placeholder');
  const hpWrap=document.getElementById('bs-boss-hpbar-wrap');
  const hpFill=document.getElementById('bs-boss-hp-fill');
  const hpName=document.getElementById('bs-boss-hp-name');

  if(!bossEntry||!bossEntry.bossId){
    img.style.display='none';ph.style.display='flex';hpWrap.style.display='none';
    return;
  }

  try{
    const r=await fetch(`/api/boss?id=${bossEntry.bossId}`);
    if(!r.ok)throw new Error();
    const b=await r.json();

    // Imagem
    if(b.visibilidade&&b.visibilidade.imagem){
      try{
        const ar=await fetch(`/api/boss-avatar?id=${b.id}`);
        if(ar.ok){
          const ad=await ar.json();
          if(ad.avatar){
            img.src=ad.avatar;img.style.display='block';ph.style.display='none';
          }else{
            img.src='';img.style.display='none';ph.style.display='flex';
          }
        }
      }catch{}
    }else{
      img.src='';img.style.display='none';ph.style.display='flex';
    }

    // HP
    if(b.visibilidade&&b.visibilidade.hp){
      const pct=hpPct(b.hpAtual,b.hpMax);
      hpFill.style.width=pct+'%';
      if(b.visibilidade.nome)hpName.textContent=esc(b.nome);
      hpWrap.style.display='block';
    }else{
      hpWrap.style.display='none';
    }
  }catch{
    img.style.display='none';ph.style.display='flex';hpWrap.style.display='none';
  }
}

// ── Render: Players (barra inferior) ─────────────────────────────────────────
function renderPlayersBottom(list){
  const row=document.getElementById('bs-players-row');
  if(!list||list.length===0){
    row.innerHTML='<div style="padding:14px 20px;font-family:Cinzel,serif;font-size:.6rem;color:var(--ink-dim);letter-spacing:.3em">NENHUM AVENTUREIRO</div>';
    return;
  }

  row.innerHTML=list.map(p=>{
    const isTurn=combatAtivo&&currentTurno&&p.id===currentTurno;
    const core=p.core||{};
    const hpAtual=Number(core.hpAtual)||0;
    const hpMax=Number(core.hpMax)||1;
    const hpP=hpPct(hpAtual,hpMax);
    const hpCls=hpColor(hpP);

    // Energia (campo opcional: p.energia = {label:'Mana', atual:40, max:80})
    const en=p.energia||null;
    const enBlock=en?`
      <div class="bs-stat-row">
        <span class="bs-stat-label">${esc(en.label||'EN')}</span>
        <span class="bs-stat-val">${en.atual}/${en.max}</span>
        <div class="bs-stat-bar-wrap"><div class="bs-stat-bar energy-bar" style="width:${hpPct(en.atual,en.max)}%"></div></div>
      </div>`:'';

    const avatarEl=p._avatarSrc
      ?`<img src="${esc(p._avatarSrc)}" alt="${esc(p.nome)}">`
      :`<div class="bs-player-avatar-placeholder">⚔</div>`;

    return `<div class="bs-player-card${isTurn?' is-turn':''}">
      <div class="bs-player-avatar">
        ${avatarEl}
        ${isTurn?'<div class="bs-player-turn-badge">VEZ</div>':''}
      </div>
      <div class="bs-player-info">
        <div class="bs-player-name">${esc(p.nome||'Aventureiro')}</div>
        <div class="bs-stat-row">
          <span class="bs-stat-label">HP</span>
          <span class="bs-stat-val">${hpAtual}/${hpMax}</span>
          <div class="bs-stat-bar-wrap"><div class="bs-stat-bar ${hpCls}" style="width:${hpP}%"></div></div>
        </div>
        ${enBlock}
      </div>
    </div>`;
  }).join('<div class="bs-player-sep"></div>');
}

// ── Render: Combate ───────────────────────────────────────────────────────────
let lastRodada=null;
let lastTurnoAtual=null;
let lastBossId=null;
let lastBossVisHash=null;

async function renderCombat(state){
  const arena=document.getElementById('bs-arena');
  const standby=document.getElementById('standby');

  if(!state||!state.ativo){
    arena.classList.remove('show');
    standby.style.display='';
    combatAtivo=false;currentTurno=null;setBadge('live');
    return;
  }

  combatAtivo=true;
  currentTurno=state.turnoAtual;
  arena.classList.add('show');
  standby.style.display='none';
  setBadge('combat');

  const rodada=state.rodada||1;
  document.getElementById('bs-round-num').textContent=rodada;

  // Log automático: mudança de rodada
  if(lastRodada!==null&&rodada!==lastRodada){
    addLog(`Rodada ${rodada} iniciada`,'system');
  }
  lastRodada=rodada;

  // Log automático: mudança de turno
  if(lastTurnoAtual!==null&&state.turnoAtual!==lastTurnoAtual&&state.turnoAtual){
    const iniciativa=Array.isArray(state.iniciativa)?state.iniciativa:[];
    const entry=iniciativa.find(e=>e.id===state.turnoAtual);
    if(entry)addLog(`Turno de ${entry.nome||'?'}`,'system');
  }
  lastTurnoAtual=state.turnoAtual;

  // Boss
  const iniciativa=Array.isArray(state.iniciativa)?state.iniciativa:[];
  const bossEntry=iniciativa.find(e=>e.tipo==='boss'||e.tipo==='inimigo');
  const newBossId=bossEntry?.bossId||null;
  await renderBossArena(bossEntry||null);
  lastBossId=newBossId;

  // Players
  renderPlayersBottom(fichas);
}

// ── Poll: combate ─────────────────────────────────────────────────────────────
async function pollCombat(){
  try{
    const r=await fetch('/api/combat');
    if(!r.ok)return;
    const data=await r.json();
    const h=JSON.stringify(data);
    if(h!==lastCombatHash){
      lastCombatHash=h;
      await renderCombat(data);
    }
  }catch{setBadge('offline')}
}

// ── Poll: fichas ──────────────────────────────────────────────────────────────
async function pollPlayers(){
  try{
    const mr=await fetch('/api/manifest');
    if(!mr.ok)return;
    const manifest=await mr.json();
    if(!Array.isArray(manifest)||manifest.length===0){fichas=[];renderPlayersBottom([]);return;}

    const h=JSON.stringify(manifest.map(m=>m.id+m.nome));
    const changed=(h!==lastPlayersHash);
    if(!changed&&fichas.length===manifest.length){
      await refreshHp(manifest);return;
    }

    lastPlayersHash=h;
    setBadge(combatAtivo?'combat':'live');

    const results=await Promise.allSettled(manifest.map(async m=>{
      const r=await fetch(`/api/ficha?id=${m.id}`);
      if(!r.ok)return null;
      return r.json();
    }));

    fichas=results.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);

    await Promise.allSettled(fichas.map(async f=>{
      try{
        const r=await fetch(`/api/avatar?id=${f.id}`);
        if(r.ok){const d=await r.json();if(d.avatar)f._avatarSrc=d.avatar;}
      }catch{}
    }));

    renderPlayersBottom(fichas);
  }catch{setBadge('offline')}
}

async function refreshHp(manifest){
  let updated=false;
  await Promise.allSettled(fichas.map(async(f,i)=>{
    try{
      const r=await fetch(`/api/ficha?id=${f.id}`);
      if(!r.ok)return;
      const fresh=await r.json();
      if(JSON.stringify(f.core)!==JSON.stringify(fresh.core)){
        fichas[i]={...fichas[i],...fresh,_avatarSrc:fichas[i]._avatarSrc};updated=true;
        // Log HP mudou
        const oldHp=Number((f.core||{}).hpAtual)||0;
        const newHp=Number((fresh.core||{}).hpAtual)||0;
        if(newHp!==oldHp){
          const diff=newHp-oldHp;
          const nome=f.nome||'Aventureiro';
          if(diff<0)addLog(`${nome} perdeu ${Math.abs(diff)} HP (${newHp} restantes)`,'attack');
          else addLog(`${nome} recuperou ${diff} HP (${newHp} total)`,'item');
        }
      }
    }catch{}
  }));
  if(updated)renderPlayersBottom(fichas);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  setBadge('live');
  await Promise.allSettled([pollCombat(),pollPlayers()]);
  setInterval(pollCombat,4000);
  setInterval(pollPlayers,10000);
}

init();
</script>
