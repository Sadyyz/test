<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modo RPG — Phantasos</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cinzel:wght@400;600;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet">
<style>
:root,[data-theme="dark"]{
  --bg:#0a0809;--bg2:#100d12;--surface:#161219;--surface2:#1e1825;
  --border:#2c2238;--ink:#ede0c8;--ink-2:#b8a890;--ink-dim:#6a5a48;
  --gold:#c8922a;--gold-lt:#e8be68;--gold-hot:#f2d078;--gold-dim:#5a3e10;
  --crimson:#7a1828;--crimson-lt:#b83040;--crimson-glow:rgba(122,24,40,.25);
  --glow-g:rgba(200,146,42,.2);--card-s:0 2px 20px rgba(0,0,0,.75);
  --rune-op:.018;--pulse-color:rgba(200,146,42,.12);
  --bs-panel:rgba(10,6,8,.92);--bs-border:rgba(180,30,50,.55);
  --bs-ornament:rgba(150,20,40,.8);
}
[data-theme="light"]{
  --bg:#f4ede0;--bg2:#ece4d4;--surface:#fdf8f0;--surface2:#f5eddc;
  --border:#c8a870;--ink:#18100a;--ink-2:#5a4030;--ink-dim:#8a6a50;
  --gold:#8a5a10;--gold-lt:#aa7830;--gold-hot:#7a4808;--gold-dim:#e8d4b0;
  --crimson:#6a0f1e;--crimson-lt:#9a1830;--crimson-glow:rgba(106,15,30,.12);
  --glow-g:rgba(138,90,16,.1);--card-s:0 2px 20px rgba(60,30,0,.08);
  --rune-op:.035;--pulse-color:rgba(138,90,16,.08);
  --bs-panel:rgba(240,225,200,.95);--bs-border:rgba(140,30,50,.45);
  --bs-ornament:rgba(120,20,40,.6);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  background:var(--bg);color:var(--ink);font-family:'IM Fell English',Georgia,serif;
  min-height:100vh;overflow-x:hidden;transition:background .5s,color .5s;
}
body::before{
  content:"ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛋᛏᛒᛖᛗᛚᛜᛞᛟ";
  position:fixed;inset:0;font-size:1.4rem;letter-spacing:.6em;line-height:4em;
  color:var(--gold);opacity:var(--rune-op);word-break:break-all;pointer-events:none;z-index:0;padding:32px;
  animation:runeShift 70s linear infinite;
}
@keyframes runeShift{0%,100%{transform:translateY(0)}50%{transform:translateY(-4%)}}
#cosmos{position:fixed;inset:0;z-index:0;pointer-events:none}

/* Top bar */
.top-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;background:rgba(10,8,9,.9);backdrop-filter:blur(6px);
  border-bottom:1px solid var(--border);
}
.top-title{font-family:'Cinzel',serif;font-size:.68rem;letter-spacing:.4em;text-transform:uppercase;color:var(--gold);text-shadow:0 0 12px var(--glow-g)}
.top-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;padding:4px 10px;border:1px solid var(--gold-dim);color:var(--gold);font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.3em;text-transform:uppercase;background:rgba(200,146,42,.06)}
.live-dot{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse-dot 1.6s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.live-badge.offline{border-color:var(--ink-dim);color:var(--ink-dim)}
.live-badge.offline .live-dot{background:var(--ink-dim);animation:none}
.live-badge.combat{border-color:var(--crimson);color:var(--crimson-lt)}
.live-badge.combat .live-dot{background:var(--crimson-lt)}
#theme-btn{background:var(--surface);border:1px solid var(--border);color:var(--gold);width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:.85rem;display:flex;align-items:center;justify-content:center;transition:all .3s}
#theme-btn:hover{border-color:var(--gold);transform:scale(1.1) rotate(20deg)}

/* Standby (fora de combate) */
.page-standby{position:relative;z-index:2;max-width:1060px;margin:0 auto;padding:78px 20px 80px}
#standby{text-align:center;padding:80px 0 20px}
.standby-ring{width:90px;height:90px;border:1px dashed var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;font-size:1.8rem;opacity:.3;animation:slowSpin 20s linear infinite}
@keyframes slowSpin{to{transform:rotate(360deg)}}
.standby-text{font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;color:var(--ink-dim)}

/* ══════════════════════════════════════════════════════
   BLACK SOULS 2 — ARENA LAYOUT
   ══════════════════════════════════════════════════════ */
#bs-arena{
  display:none;position:fixed;inset:0;z-index:10;
  background:var(--bg);overflow:hidden;
}
#bs-arena.show{display:flex;flex-direction:column}

/* ── Arena Background ── */
#bs-arena-bg{
  position:absolute;inset:0;z-index:0;
  background-size:cover;background-position:center;background-repeat:no-repeat;
  transition:opacity .8s ease, background .8s ease;
}
#bs-arena-bg-dim{
  position:absolute;inset:0;z-index:1;
  background:rgba(0,0,0,0);
  transition:background .8s ease;
  pointer-events:none;
}
/* Garante que o conteúdo da arena fica acima do fundo */
#bs-boss-area, #bs-round-badge, #bs-log-toggle, #standby-bs{
  position:relative;z-index:2;
}
#bs-players-bottom{
  position:relative;z-index:2;
}

/* ── Boss Area (imagem) */
#bs-boss-area{
  flex:1;position:relative;overflow:hidden;min-height:0;
  display:flex;align-items:center;justify-content:center;
}
#bs-boss-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  font-size:8rem;opacity:.08;color:var(--crimson-lt);
}

/* ── Grid de bosses ── */
#bs-boss-grid{
  width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;
  gap:0;
  position:relative;
}

/* Slot individual de boss */
.bs-boss-slot{
  position:relative;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  height:100%;
  flex:1;min-width:0;
  transition:all .4s ease;
}

/* Imagem dentro do slot */
.bs-boss-slot-img{
  max-height:85%;max-width:100%;width:auto;height:auto;
  object-fit:contain;object-position:bottom center;
  display:block;
  filter:brightness(.9) contrast(1.05) drop-shadow(0 0 32px rgba(120,0,0,.5));
  transition:all .5s ease;
}

/* Slot central (boss primário) — ligeiramente maior */
.bs-boss-slot.primary .bs-boss-slot-img{
  max-height:92%;
  filter:brightness(.95) contrast(1.08) drop-shadow(0 0 40px rgba(160,20,20,.6));
}

/* Slots laterais — levemente menores e atrás */
.bs-boss-slot.secondary{
  z-index:0;
}
.bs-boss-slot.primary{
  z-index:1;
}
.bs-boss-slot.secondary .bs-boss-slot-img{
  max-height:78%;
  filter:brightness(.75) contrast(1.02) drop-shadow(0 0 20px rgba(80,0,0,.4));
}

/* HP bar por boss */
.bs-boss-slot-hpbar{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  width:min(280px,85%);z-index:5;
}
.bs-boss-slot-hp-label{
  font-family:'Cinzel',serif;font-size:.42rem;letter-spacing:.4em;text-transform:uppercase;
  color:var(--crimson-lt);text-align:center;margin-bottom:3px;text-shadow:0 0 8px #000;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

/* Boss HP bar (flutuante sobre a imagem, no centro) */
#bs-boss-hpbar-wrap{
  position:absolute;bottom:16px;left:50%;transform:translateX(-50%);
  width:min(420px,80%);z-index:5;
}
.bs-boss-hp-label{
  font-family:'Cinzel',serif;font-size:.5rem;letter-spacing:.5em;text-transform:uppercase;
  color:var(--crimson-lt);text-align:center;margin-bottom:4px;text-shadow:0 0 8px #000;
}
.bs-hp-track{
  height:8px;background:rgba(0,0,0,.7);border:1px solid var(--crimson);
  position:relative;overflow:hidden;
}
.bs-hp-fill{
  height:100%;background:linear-gradient(90deg,#6a0010,#c03040);
  transition:width .6s ease;box-shadow:0 0 8px rgba(180,30,50,.6);
}

/* Rodada badge flutuante */
#bs-round-badge{
  position:absolute;top:16px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:.58rem;letter-spacing:.4em;text-transform:uppercase;
  color:var(--gold);padding:6px 18px;
  background:rgba(10,6,8,.7);border:1px solid var(--gold-dim);
  text-shadow:0 0 10px var(--glow-g);z-index:5;
}



/* ── Log toggle button */
#bs-log-toggle{
  position:absolute;top:12px;right:12px;z-index:20;
  background:rgba(8,4,6,.82);border:1px solid var(--bs-border);
  color:var(--gold);font-family:'Cinzel',serif;font-size:.52rem;letter-spacing:.2em;
  padding:5px 12px;cursor:pointer;text-transform:uppercase;
  transition:background .2s,border-color .2s;
}
#bs-log-toggle:hover{background:rgba(122,24,40,.4);border-color:var(--crimson-lt)}

/* ── Log drawer (slide in from right) */
#bs-log-panel{
  position:fixed;top:44px;right:0;bottom:0;z-index:300;
  width:280px;display:flex;flex-direction:column;
  transform:translateX(100%);transition:transform .3s ease;
  pointer-events:none;
}
#bs-log-panel.log-open{transform:translateX(0);pointer-events:auto}
.bs-log-header{
  font-family:'Cinzel',serif;font-size:.48rem;letter-spacing:.45em;text-transform:uppercase;
  color:var(--gold-dim);padding:8px 12px 6px;
  background:rgba(8,4,6,.96);border:1px solid var(--bs-border);border-right:none;border-bottom:none;
  display:flex;align-items:center;justify-content:space-between;gap:6px;
}
.bs-log-header-left{display:flex;align-items:center;gap:6px}
.bs-log-header-dot{width:5px;height:5px;border-radius:50%;background:var(--crimson-lt);animation:pulse-dot 1.6s ease-in-out infinite}
#bs-log-close{background:none;border:none;color:var(--ink-dim);cursor:pointer;font-size:.9rem;padding:0 2px;line-height:1}
#bs-log-close:hover{color:var(--crimson-lt)}
#bs-log-scroll{
  flex:1;overflow-y:auto;
  background:rgba(8,4,6,.94);border:1px solid var(--bs-border);border-right:none;border-top:none;
  padding:6px 0;
  scrollbar-width:thin;scrollbar-color:var(--crimson) transparent;
}
#bs-log-scroll::-webkit-scrollbar{width:3px}
#bs-log-scroll::-webkit-scrollbar-track{background:transparent}
#bs-log-scroll::-webkit-scrollbar-thumb{background:var(--crimson)}
.bs-log-entry{
  padding:4px 12px;font-family:'IM Fell English',serif;font-size:.68rem;
  color:var(--ink-2);line-height:1.4;border-bottom:1px solid rgba(44,34,56,.3);
}
.bs-log-entry:last-child{border-bottom:none}
.bs-log-entry .log-time{color:var(--ink-dim);font-size:.56rem;display:block;margin-bottom:1px}
.bs-log-entry.log-attack .log-icon{color:var(--crimson-lt)}
.bs-log-entry.log-skill .log-icon{color:#6090d0}
.bs-log-entry.log-item .log-icon{color:#50a060}
.bs-log-entry.log-system .log-icon{color:var(--gold-dim)}
.bs-log-entry.log-manual .log-icon{color:var(--gold-lt)}

/* Entrada manual */
.bs-log-input-row{
  display:flex;gap:4px;padding:6px;
  background:rgba(8,4,6,.96);border:1px solid var(--bs-border);border-right:none;border-top:none;
}
#bs-log-input{
  flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border);
  color:var(--ink);font-family:'IM Fell English',serif;font-size:.7rem;padding:5px 8px;
  outline:none;
}
#bs-log-input:focus{border-color:var(--gold-dim)}
#bs-log-send{
  background:var(--crimson);border:none;color:var(--ink);font-size:.7rem;
  padding:5px 10px;cursor:pointer;transition:background .2s;
}
#bs-log-send:hover{background:var(--crimson-lt)}

/* ── Bottom Panel: Players */
#bs-players-bottom{
  flex-shrink:0;
  background:var(--bs-panel);
  border-top:2px solid var(--bs-border);
  position:relative;z-index:8;
  padding:8px 10px;
}

/* Ornamental top border */
#bs-players-bottom::before{
  content:'';position:absolute;top:-1px;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--crimson-lt) 20%,var(--crimson-lt) 80%,transparent);
  opacity:.5;
}

/* Padrão de ornamento tipo spades do Black Souls 2 */
.bs-ornament-strip{
  height:6px;
  background:repeating-linear-gradient(90deg,
    var(--crimson) 0,var(--crimson) 3px,
    transparent 3px,transparent 8px,
    var(--gold-dim) 8px,var(--gold-dim) 9px,
    transparent 9px,transparent 14px
  );
  opacity:.4;
}

/* Grid de players — 2 colunas fixas, cresce para 3 em telas maiores */
.bs-players-row{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:6px;
}
@media(min-width:700px){
  .bs-players-row{grid-template-columns:repeat(3,1fr)}
}
@media(min-width:1050px){
  .bs-players-row{grid-template-columns:repeat(4,1fr)}
}

/* Card de cada player */
.bs-player-card{
  display:flex;align-items:center;gap:0;
  border:1px solid rgba(44,34,56,.8);
  position:relative;transition:background .3s;
  background:rgba(10,6,8,.6);
  cursor:pointer;
}
.bs-player-card:hover{background:rgba(200,146,42,.05);border-color:rgba(200,146,42,.25)}
.bs-player-card.is-turn{background:rgba(200,146,42,.08);border-color:rgba(200,146,42,.5)}
.bs-player-card.is-turn::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.bs-player-sep{display:none}

/* Avatar */
.bs-player-avatar{
  width:52px;height:60px;flex-shrink:0;overflow:hidden;position:relative;
}
.bs-player-avatar img{width:100%;height:100%;object-fit:cover;object-position:top;display:block}
.bs-player-avatar-placeholder{
  width:100%;height:100%;display:flex;align-items:center;justify-content:center;
  background:var(--surface2);font-size:1.4rem;color:var(--gold);opacity:.4;
}

/* Turno badge */
.bs-player-turn-badge{
  position:absolute;top:2px;right:2px;background:var(--gold);color:var(--bg);
  font-family:'Cinzel',serif;font-size:.42rem;padding:1px 4px;letter-spacing:.08em;
}

/* Info do player */
.bs-player-info{
  flex:1;padding:7px 10px;display:flex;flex-direction:column;gap:4px;min-width:0;
}
.bs-player-name{
  font-family:'Cinzel',serif;font-size:.7rem;letter-spacing:.06em;text-transform:uppercase;
  color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-decoration:underline;text-decoration-color:rgba(200,146,42,.3);text-underline-offset:3px;
}
.bs-player-card:hover .bs-player-name{color:var(--gold-lt)}
.bs-player-card.is-turn .bs-player-name{color:var(--gold-hot)}

/* Barra de HP */
.bs-stat-row{display:flex;align-items:center;gap:5px}
.bs-stat-label{
  font-family:'Cinzel',serif;font-size:.46rem;letter-spacing:.18em;text-transform:uppercase;
  color:var(--ink-dim);min-width:18px;
}
.bs-stat-val{
  font-family:'Cinzel',serif;font-size:.66rem;color:var(--ink-2);
  white-space:nowrap;min-width:52px;
}
.bs-stat-bar-wrap{flex:1;height:5px;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.06);min-width:30px}
.bs-stat-bar{height:100%;transition:width .4s ease,background .4s}

/* HP coloring */
.hp-high{background:linear-gradient(90deg,#1a6a20,#28a830)}
.hp-mid{background:linear-gradient(90deg,#904010,#d05820)}
.hp-low{background:linear-gradient(90deg,#500000,#800010)}

/* Energia coloring */
.energy-bar{background:linear-gradient(90deg,#1a408a,#2860c0)}

/* Separador entre players */
.bs-player-sep{
  width:1px;background:linear-gradient(180deg,transparent,var(--bs-border),transparent);
  align-self:stretch;flex-shrink:0;
}

/* Estados fora de combate */
#standby-bs{
  text-align:center;padding:80px 0;
  font-family:'Cinzel',serif;font-size:.62rem;letter-spacing:.38em;text-transform:uppercase;
  color:var(--ink-dim);
}
.standby-ring-bs{
  width:90px;height:90px;border:1px dashed var(--border);border-radius:50%;
  display:flex;align-items:center;justify-content:center;margin:0 auto 18px;
  font-size:1.8rem;opacity:.3;animation:slowSpin 20s linear infinite;
}

/* Mobile adjustments */
@media(max-width:480px){
  #bs-log-panel{width:100vw}
  .bs-players-row{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<canvas id="cosmos"></canvas>

<header class="top-bar">
  <div class="top-title">⚔ Modo RPG</div>
  <div class="top-right">
    <div class="live-badge offline" id="live-badge">
      <span class="live-dot"></span>
      <span id="live-text">Aguardando…</span>
    </div>
    <button id="theme-btn" title="Alternar tema">☽</button>
  </div>
</header>

<!-- ══ ARENA: Black Souls 2 Layout (aparece em combate) ══ -->
<div id="bs-arena">
  <!-- Fundo customizável -->
  <div id="bs-arena-bg"></div>
  <div id="bs-arena-bg-dim"></div>

  <!-- Área do Boss (imagem grande) -->
  <div id="bs-boss-area">
    <div id="bs-boss-placeholder">☠</div>
    <div id="bs-boss-grid"></div>

    <!-- Rodada -->
    <div id="bs-round-badge">Rodada <span id="bs-round-num">1</span></div>

    <!-- Botão de abrir histórico -->
    <button id="bs-log-toggle">📜 Histórico</button>
  </div>

  <!-- Tira ornamental -->
  <div class="bs-ornament-strip"></div>

  <!-- Barra inferior: Players -->
  <div id="bs-players-bottom">
    <div class="bs-players-row" id="bs-players-row">
      <!-- preenchido via JS -->
    </div>
  </div>

</div>

<!-- Log drawer (fixo, fora da arena) -->
<div id="bs-log-panel">
  <div class="bs-log-header">
    <div class="bs-log-header-left">
      <span class="bs-log-header-dot"></span>
      Histórico de Combate
    </div>
    <button id="bs-log-close">✕</button>
  </div>
  <div id="bs-log-scroll">
    <div class="bs-log-entry log-system">
      <span class="log-icon">⚙</span>
      <span class="log-time" id="log-init-time"></span>
      Combate iniciado
    </div>
  </div>
  <div class="bs-log-input-row">
    <input id="bs-log-input" type="text" placeholder="Narrar ação…" maxlength="120">
    <button id="bs-log-send">▶</button>
  </div>
</div>

<!-- Tela de standby (fora de combate) -->
<div class="page-standby">
  <div id="standby">
    <div class="standby-ring">⧖</div>
    <p class="standby-text">Aguardando o Mestre iniciar o combate</p>
  </div>
</div>

<script>
// ── Partículas ────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('cosmos'),ctx=c.getContext('2d');
  let W,H,ps=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);
  function cols(){
    return document.documentElement.getAttribute('data-theme')==='light'
      ?['rgba(138,90,16,','rgba(168,120,48,','rgba(100,70,20,']
      :['rgba(200,146,42,','rgba(242,208,120,','rgba(90,62,16,'];
  }
  for(let i=0;i<44;i++)ps.push({
    x:Math.random()*1400,y:Math.random()*900,
    r:Math.random()*1.4+.3,vx:(Math.random()-.5)*.2,vy:(Math.random()-.5)*.2,
    a:Math.random()*.3+.07,p:Math.random()*Math.PI*2,
    ps:Math.random()*.015+.005,ci:Math.floor(Math.random()*3)
  });
  function draw(){
    ctx.clearRect(0,0,W,H);const cl=cols();
    ps.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.p+=p.ps;
      if(p.x<-5)p.x=W+5;if(p.x>W+5)p.x=-5;
      if(p.y<-5)p.y=H+5;if(p.y>H+5)p.y=-5;
      const a=p.a*(0.55+0.45*Math.sin(p.p));
      ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=cl[p.ci]+a+')';ctx.fill();
    });
    for(let i=0;i<ps.length;i++)for(let j=i+1;j<ps.length;j++){
      const dx=ps[i].x-ps[j].x,dy=ps[i].y-ps[j].y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<80){ctx.beginPath();ctx.moveTo(ps[i].x,ps[i].y);ctx.lineTo(ps[j].x,ps[j].y);
      ctx.strokeStyle=cl[0]+(0.05*(1-d/80))+')';ctx.lineWidth=.4;ctx.stroke();}
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

// ── Utils ─────────────────────────────────────────────────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function hpColor(pct){return pct>60?'hp-high':pct>25?'hp-mid':'hp-low'}
function hpPct(atual,max){return Math.max(0,Math.min(100,((Number(atual)||0)/(Math.max(1,Number(max)||1)))*100))}

function nowTime(){
  const d=new Date();
  return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}

// ── Render: Boss (arena) ──────────────────────────────────────────────────────
async function renderBossArena(bossEntries){
  // Aceita array ou entry único (retrocompatibilidade)
  const entries = Array.isArray(bossEntries)
    ? bossEntries.filter(e => e && e.bossId)
    : (bossEntries && bossEntries.bossId ? [bossEntries] : []);

  const grid = document.getElementById('bs-boss-grid');
  const ph   = document.getElementById('bs-boss-placeholder');

  if(entries.length === 0){
    grid.innerHTML = '';
    grid.style.display = 'none';
    ph.style.display = 'flex';
    return;
  }

  ph.style.display = 'none';
  grid.style.display = 'flex';

  // Busca dados de todos os bosses em paralelo
  const bossData = await Promise.all(entries.map(async entry => {
    try{
      const r = await fetch(`/api/boss?id=${entry.bossId}`);
      if(!r.ok) return null;
      const b = await r.json();

      let avatarSrc = null;
      if(b.visibilidade && b.visibilidade.imagem){
        try{
          // Usa cache; limpa quando bossUpdatedAt muda (via pollCombat)
          if(_bossAvatarCache[b.id] !== undefined){
            avatarSrc = _bossAvatarCache[b.id];
          } else {
            const ar = await fetch(`/api/boss-avatar?id=${b.id}`);
            if(ar.ok){ const ad = await ar.json(); avatarSrc = ad.avatar || null; }
            _bossAvatarCache[b.id] = avatarSrc;
          }
        }catch{}
      }
      return { ...b, _avatarSrc: avatarSrc, _entry: entry };
    }catch{ return null; }
  }));

  const valid = bossData.filter(Boolean);
  if(valid.length === 0){
    grid.innerHTML = '';
    grid.style.display = 'none';
    ph.style.display = 'flex';
    return;
  }

  // Layout: determina quem é primário (centro) e secundários (lados)
  // 1 boss  → só primário
  // 2 bosses → primário esquerda, secundário direita
  // 3 bosses → secundário, primário (centro), secundário
  // N bosses → alterna: centro é o primeiro, depois distribui
  function getSlotOrder(n){
    if(n === 1) return [{ idx:0, role:'primary' }];
    if(n === 2) return [
      { idx:0, role:'primary' },
      { idx:1, role:'secondary' }
    ];
    if(n === 3) return [
      { idx:1, role:'secondary' },
      { idx:0, role:'primary' },
      { idx:2, role:'secondary' }
    ];
    // 4+ → todos secondary exceto o primeiro que fica no centro
    const order = [];
    const leftSide  = [];
    const rightSide = [];
    for(let i=1;i<n;i++){ if(i%2===1) leftSide.push(i); else rightSide.push(i); }
    leftSide.reverse().forEach(i => order.push({ idx:i, role:'secondary' }));
    order.push({ idx:0, role:'primary' });
    rightSide.forEach(i => order.push({ idx:i, role:'secondary' }));
    return order;
  }

  const slotOrder = getSlotOrder(valid.length);

  grid.innerHTML = slotOrder.map(({ idx, role }) => {
    const b = valid[idx];
    const imgHtml = b._avatarSrc
      ? `<img class="bs-boss-slot-img" src="${b._avatarSrc}" alt="${esc(b.nome||'')}">`
      : `<div style="font-size:5rem;opacity:.15;color:var(--crimson-lt);padding-bottom:40px">☠</div>`;

    const showHp = b.visibilidade && b.visibilidade.hp;
    const pct    = showHp ? hpPct(b.hpAtual ?? b._entry?.hpAtual, b.hpMax ?? b._entry?.hpMax) : 100;
    const nome   = (b.visibilidade && b.visibilidade.nome) ? esc(b.nome||'BOSS') : 'BOSS';

    const hpHtml = showHp ? `
      <div class="bs-boss-slot-hpbar">
        <div class="bs-boss-slot-hp-label">${nome}</div>
        <div class="bs-hp-track">
          <div class="bs-hp-fill" style="width:${pct}%"></div>
        </div>
      </div>` : '';

    return `<div class="bs-boss-slot ${role}" data-boss-id="${esc(b.id||'')}">${imgHtml}${hpHtml}</div>`;
  }).join('');
}

      </div>
      <div class="bs-stat-row">
        <span class="bs-stat-label" style="color:var(--gold-dim)">EXP</span>
        <span class="bs-stat-val">${exp}%</span>
        <div class="bs-stat-bar-wrap"><div class="bs-stat-bar" style="width:${exp}%;background:#2a5060"></div></div>
      </div>`;

    const avatarEl=p._avatarSrc
      ?`<img src="${esc(p._avatarSrc)}" alt="${esc(p.nome)}">`

    return `<div class="bs-player-card${isTurn?' is-turn':''}" data-player-id="${esc(p.id)}" title="Abrir ficha de ${esc(p.nome||'Escritor')}">

// ── Render: Combate ───────────────────────────────────────────────────────────
let lastRodada=null;
let lastTurnoAtual=null;
let lastBossId=null;
let lastContoEncerrado=null;
let lastBossVisHash=null;
let lastBossUpdatedAt=null;
let lastArenaBgUpdatedAt=null;

// Cache de avatares para não buscar toda poll
const _bossAvatarCache = {};
const _playerAvatarCache = {};

async function renderCombat(state){
  const arena=document.getElementById('bs-arena');
  const standbyWrap=document.getElementById('standby').closest('.page-standby');

  if(!state||!state.ativo){
    arena.classList.remove('show');
    standbyWrap.style.display='';
    combatAtivo=false;currentTurno=null;setBadge('live');
    return;
  }

  combatAtivo=true;
  currentTurno=state.turnoAtual;
  arena.classList.add('show');
  standbyWrap.style.display='none';
  setBadge('combat');

  const rodada=state.rodada||1;
  document.getElementById('bs-round-num').textContent=rodada;

  // Log automático: mudança de rodada
  if(lastRodada!==null&&rodada!==lastRodada){
    addLog(`Rodada ${rodada} iniciada`,'system');
  }
  lastRodada=rodada;

  // Log automático: mudança de turno
  if(lastTurnoAtual!==null&&state.turnoAtual!==lastTurnoAtual&&state.turnoAtual){
    const iniciativa=Array.isArray(state.iniciativa)?state.iniciativa:[];
    const entry=iniciativa.find(e=>e.id===state.turnoAtual);
    if(entry)addLog(`Turno de ${entry.nome||'?'}`,'system');
  }
  lastTurnoAtual=state.turnoAtual;

  // Bosses (múltiplos)
  const iniciativa=Array.isArray(state.iniciativa)?state.iniciativa:[];
  const bossEntries=iniciativa.filter(e=>e.tipo==='boss'||e.tipo==='inimigo');
  const bossEntry=bossEntries[0]||null;
  const newBossId=bossEntry?.bossId||null;

  // Log quando boss morre — animação SÓ pelo botão do Mestre
  if(bossEntries.length>0 && _lastBossHpMap!==null){
    bossEntries.forEach(e=>{
      const wasAlive=(_lastBossHpMap??{})[e.id]??null;
      const nowHp=Number(e.hpAtual??0);
      if(wasAlive!==null && wasAlive>0 && nowHp<=0){
        addLog(`${e.nome||'Criatura'} foi derrotada!`,'system');
      }
    });
  }
  if(bossEntries.length>0){
    _lastBossHpMap={};
    bossEntries.forEach(e=>{ _lastBossHpMap[e.id]=Number(e.hpAtual??0); });
  } else {
    _lastBossHpMap=null;
  }

  await renderBossArena(bossEntries);
  lastBossId = bossEntries.map(e=>e.bossId).join(',');

  // Players
  renderPlayersBottom(fichas);
}

// ── Arena Background ─────────────────────────────────────────────────────────
async function applyArenaBg(dim=0.4){
  try{
    const r = await fetch('/api/arena-bg');
    if(!r.ok) return;
    const { bg } = await r.json();
    const bgEl  = document.getElementById('bs-arena-bg');
    const dimEl = document.getElementById('bs-arena-bg-dim');
    if(!bg){
      bgEl.style.background='';
      bgEl.style.backgroundImage='';
      dimEl.style.background='rgba(0,0,0,0)';
      return;
    }
    if(bg.startsWith('data:image/')){
      bgEl.style.backgroundImage=`url(${JSON.stringify(bg)})`;
      bgEl.style.background='';
    } else {
      // cor sólida
      bgEl.style.backgroundImage='';
      bgEl.style.background=bg;
    }
    dimEl.style.background=`rgba(0,0,0,${Math.min(0.95,dim)})`;
  }catch{}
}

// ── Poll: combate ─────────────────────────────────────────────────────────────
async function pollCombat(){
  try{
    const r=await fetch('/api/combat');
    if(!r.ok)return;
    const data=await r.json();
    const h=JSON.stringify(data);
    if(h!==lastCombatHash){
      lastCombatHash=h;
      if(data.contoEncerrado && data.contoEncerrado !== lastContoEncerrado){
        lastContoEncerrado=data.contoEncerrado;
        // Só dispara se o combate está ativo e há/havia inimigos na iniciativa
        const temInimigos = Array.isArray(data.iniciativa) && data.iniciativa.some(e=>e.tipo==='boss'||e.tipo==='inimigo');
        if(data.ativo && temInimigos){
          setTimeout(()=>dispararContoEncerrado(data.contoNome||''), 200);
        }
      }
      if(data.arenaBgUpdatedAt && data.arenaBgUpdatedAt !== lastArenaBgUpdatedAt){
        lastArenaBgUpdatedAt = data.arenaBgUpdatedAt;
        applyArenaBg(data.arenaBgDim ?? 0.4);
      }
      if(data.bossUpdatedAt && data.bossUpdatedAt !== lastBossUpdatedAt){
        lastBossUpdatedAt=data.bossUpdatedAt;
        Object.keys(_bossAvatarCache).forEach(k=>delete _bossAvatarCache[k]);
        lastBossId=null;
      }
      await renderCombat(data);
    }
  }catch{setBadge('offline')}
}

// ── Poll: fichas ──────────────────────────────────────────────────────────────
async function pollPlayers(){
  try{
    // Só mostra players que o Mestre adicionou à iniciativa
    let jogadorIds=[];
    try{
      const cr=await fetch('/api/combat');
      if(cr.ok){
        const cs=await cr.json();
        if(cs&&Array.isArray(cs.iniciativa)){
          jogadorIds=cs.iniciativa.filter(e=>e.tipo==='jogador'&&e.id).map(e=>e.id);
        }
      }
    }catch{}

    if(jogadorIds.length===0){fichas=[];renderPlayersBottom([]);return;}

    const h=jogadorIds.join(',');
    if(h===lastPlayersHash&&fichas.length===jogadorIds.length){
      await refreshHp(jogadorIds);return;
    }
    lastPlayersHash=h;

    const results=await Promise.allSettled(jogadorIds.map(async id=>{
      const r=await fetch(`/api/ficha?id=${encodeURIComponent(id)}`);
      if(!r.ok)return null;
      const data=await r.json();
      return {...data, id}; // garante id mesmo se a API não retornar
    }));
    fichas=results.filter(r=>r.status==='fulfilled'&&r.value).map(r=>r.value);

    // Avatar: nunca cacheia null — só cacheia URL real, retenta se não tiver
    await Promise.allSettled(fichas.map(async f=>{
      try{
        const cached=_playerAvatarCache[f.id];
        if(typeof cached==='string'&&cached.length>0){
          f._avatarSrc=cached;
        } else {
          const r=await fetch(`/api/avatar?id=${encodeURIComponent(f.id)}`);
          if(r.ok){
            const src=(await r.json()).avatar||null;
            f._avatarSrc=src;
            if(src) _playerAvatarCache[f.id]=src;
          } else {
            f._avatarSrc=null; // não cacheia, retenta na próxima poll
          }
        }
      }catch{f._avatarSrc=null;}
    }));

    renderPlayersBottom(fichas);
  }catch{setBadge('offline');}
}

async function refreshHp(manifest){
  let updated=false;
  await Promise.allSettled(fichas.map(async(f,i)=>{
    try{
      const r=await fetch(`/api/ficha?id=${f.id}`);
      if(!r.ok)return;
      const fresh=await r.json();

      // Detecta qualquer mudança na ficha (não só HP)
      const oldHash=JSON.stringify({vida:f.vida,sanidade:f.sanidade,nome:f.nome,exposicao:f.exposicao});
      const newHash=JSON.stringify({vida:fresh.vida,sanidade:fresh.sanidade,nome:fresh.nome,exposicao:fresh.exposicao});
      if(oldHash!==newHash){
        fichas[i]={...fichas[i],...fresh,_avatarSrc:fichas[i]._avatarSrc};updated=true;

        const oldHp=Number((f.vida||{}).atual??10);
        const newHp=Number((fresh.vida||{}).atual??10);
        if(newHp!==oldHp){
          const diff=newHp-oldHp;
          const nome=fresh.nome||'Escritor';
          if(diff<0)addLog(`${nome} perdeu ${Math.abs(diff)} de Vida (${newHp} restantes)`,'attack');
          else addLog(`${nome} recuperou ${diff} de Vida (${newHp} total)`,'item');
        }
        const oldS=Number((f.sanidade||{}).atual??100);
        const newS=Number((fresh.sanidade||{}).atual??100);
        if(newS!==oldS){
          const diff=newS-oldS;
          const nome=fresh.nome||'Escritor';
          if(diff<0)addLog(`${nome} perdeu ${Math.abs(diff)} de Sanidade (${newS} restantes)`,'skill');
        }
      }
    }catch{}
  }));
  if(updated)renderPlayersBottom(fichas);
}


// ══════════════════════════════════════════════════

let _lastBossHpMap = null;

function dispararContoEncerrado(nomeBoss) {
  if (document.getElementById('conto-encerrado-overlay')) return;

  const bossImgs = document.querySelectorAll('.bs-boss-slot-img');
  const arena    = document.getElementById('bs-arena');

        0%   { transform:translate(0,0) rotate(0deg); }

        10%  { transform:translate(9px,-5px) rotate(.6deg); }
        20%  { transform:translate(10px,-3px) rotate(.7deg); }
        30%  { transform:translate(6px,-8px) rotate(.4deg); }
        40%  { transform:translate(8px,-5px) rotate(.5deg); }
        55%  { transform:translate(-7px,6px) rotate(-.5deg); }
        70%  { transform:translate(-4px,3px) rotate(-.2deg); }
        85%  { transform:translate(2px,-2px) rotate(.1deg); }

        40%{ transform:translate(6px,-4px); }
        60%{ transform:translate(-4px,5px); }
        80%{ transform:translate(5px,-3px); }
      }
      @keyframes bossSink {

        10%  { transform:translateY(5px)   scale(0.99) rotate(-.2deg);  filter:brightness(0.45) saturate(0) contrast(0.88); opacity:1; }
        30%  { transform:translateY(35px)  scale(0.97) rotate(-.8deg);  filter:brightness(0.25) saturate(0) contrast(0.82); opacity:.9; }
        60%  { transform:translateY(110px) scale(0.93) rotate(-1.8deg); filter:brightness(0.08) saturate(0) contrast(0.72); opacity:.5; }

        20% { opacity:.35; }

  // Vinheta escura crescendo
  const vignette = document.createElement('div');

  document.querySelectorAll('.bs-hp-fill').forEach(fill=>{
    fill.style.transition='width 1.2s ease'; fill.style.width='0%';
  });

  // FASE 1 — terremoto 1.8s
  bossImgs.forEach(img=>{

    img.style.animation='quake 0.09s ease-in-out infinite';
  });

    if(arena) arena.appendChild(fl);

    });
  },900);

  // FASE 2 — para tremor, dessatura (0.5s parado)
  setTimeout(()=>{
    if(arena) arena.style.animation='';
    bossImgs.forEach(img=>{
      img.style.animation='';
      img.style.transformOrigin='bottom center';
      img.style.transition='filter 0.5s ease';
      img.style.filter='brightness(0.55) saturate(0) contrast(0.9)';
    });

    // FASE 3 — afunda pesado estilo Black Souls 2
    setTimeout(()=>{
      bossImgs.forEach(img=>{
        img.style.transition='none';
        img.style.animation='bossSink 3.8s cubic-bezier(0.16,0,0.38,1) forwards';
      });
      document.querySelectorAll('.bs-boss-slot-hpbar').forEach(bar=>{
        bar.style.transition='opacity 0.7s ease'; bar.style.opacity='0';
      });
    },480);
  },1800);

  // FASE 4 — overlay CONTO ENCERRADO
  setTimeout(()=>{
    const ov=document.createElement('div');
    ov.id='conto-encerrado-overlay';
    ov.style.cssText='position:fixed;inset:0;z-index:9999;background:#000;opacity:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:28px;transition:opacity 1.1s ease;cursor:pointer;';

    const lT=document.createElement('div');
    lT.style.cssText='width:0;height:1px;background:linear-gradient(90deg,transparent,#8B1A1A,transparent);transition:width 1.6s ease 0.3s;';

    const txt=document.createElement('div');
    txt.style.cssText='font-family:Cinzel,serif;font-size:clamp(1.1rem,4vw,2.2rem);letter-spacing:.55em;text-transform:uppercase;color:#c8a878;opacity:0;transform:translateY(14px);transition:opacity 1.2s ease 0.7s,transform 1.2s ease 0.7s;text-align:center;padding:0 24px;text-shadow:0 0 40px rgba(180,100,20,.4);';
    txt.textContent='CONTO ENCERRADO';

    const sub=document.createElement('div');
    sub.style.cssText='font-family:IM Fell English,serif;font-size:clamp(.65rem,2vw,.95rem);letter-spacing:.2em;color:#5a3a20;font-style:italic;opacity:0;transition:opacity 0.9s ease 1.9s;text-align:center;padding:0 24px;';
    sub.textContent=nomeBoss||'';

    const lB=document.createElement('div');
    lB.style.cssText='width:0;height:1px;background:linear-gradient(90deg,transparent,#8B1A1A,transparent);transition:width 1.6s ease 0.3s;';

    const hint=document.createElement('div');
    hint.style.cssText='position:absolute;bottom:28px;font-family:Cinzel,serif;font-size:.42rem;letter-spacing:.3em;text-transform:uppercase;color:#2a1508;opacity:0;transition:opacity 0.6s ease 2.8s;';
    hint.textContent='toque para continuar';

    ov.appendChild(lT); ov.appendChild(txt);
    if(nomeBoss) ov.appendChild(sub);
    ov.appendChild(lB); ov.appendChild(hint);
    document.body.appendChild(ov);

    requestAnimationFrame(()=>requestAnimationFrame(()=>{
      ov.style.opacity='1';
      setTimeout(()=>{ lT.style.width='min(380px,60vw)'; lB.style.width='min(380px,60vw)'; },150);
      setTimeout(()=>{ txt.style.opacity='1'; txt.style.transform='translateY(0)'; },600);
      setTimeout(()=>{ sub.style.opacity='1'; },1800);
      setTimeout(()=>{ hint.style.opacity='1'; },2600);
    }));

    ov.addEventListener('click',()=>{
      ov.style.transition='opacity 0.5s ease'; ov.style.opacity='0';
      setTimeout(()=>{
        ov.remove();
        document.getElementById('conto-vignette')?.remove();
        document.querySelectorAll('.bs-boss-slot-img').forEach(el=>{
          el.style.filter=''; el.style.transform=''; el.style.opacity='';
          el.style.transition=''; el.style.animation='';
        });
        _lastBossHpMap=null;
      },550);
    });
  },6300);
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  setBadge('live');
  await Promise.allSettled([pollCombat(),pollPlayers()]);
  applyArenaBg(0.4); // carrega fundo salvo no Redis ao abrir
  setInterval(pollCombat,4000);
  setInterval(pollPlayers,4000);
}

init();
</script>
